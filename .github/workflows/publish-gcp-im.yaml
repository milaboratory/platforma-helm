name: Publish GCP Infrastructure Manager source

# Packages infrastructure/gcp/terraform/ + bundles the chart, uploads to
# gs://platforma-infrastructure-manager/. Users (or the Cloud Shell tutorial)
# point Infrastructure Manager at the resulting tarball URL.
#
# Triggers:
#   - tag matching gcp-im-v* → publishes <version>.tar.gz + updates latest.tar.gz
#   - workflow_dispatch (manual) → publishes a dev build under dev-<sha>.tar.gz
#                                 without touching latest.tar.gz
on:
  push:
    tags:
      - 'gcp-im-v*'
  workflow_dispatch:
    inputs:
      version_override:
        description: "Override version label (default: dev-<short-sha>)"
        type: string
        required: false
        default: ""

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version + destination
        id: version
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/gcp-im-v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/gcp-im-v}"
            UPDATE_LATEST=true
          else
            OVERRIDE="${{ github.event.inputs.version_override }}"
            if [[ -n "${OVERRIDE}" ]]; then
              VERSION="${OVERRIDE}"
            else
              VERSION="dev-$(git rev-parse --short HEAD)"
            fi
            UPDATE_LATEST=false
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "update_latest=${UPDATE_LATEST}" >> "${GITHUB_OUTPUT}"
          echo "tarball=platforma-gcp-${VERSION}.tar.gz" >> "${GITHUB_OUTPUT}"
          echo "Publishing version ${VERSION} (update latest: ${UPDATE_LATEST})"

      - name: Stage IM bundle
        run: |
          set -euo pipefail
          STAGING="$(mktemp -d)/im-bundle"
          mkdir -p "${STAGING}"

          # Copy Terraform source.
          cp -r infrastructure/gcp/terraform/. "${STAGING}/"

          # IM rejects bundles that include a backend block — strip it.
          rm -f "${STAGING}/backend.tf"

          # Defensive: remove dev-only artifacts that might be present locally
          # but should never ship in the public bundle.
          rm -f  "${STAGING}/terraform.tfvars" "${STAGING}/tfplan" "${STAGING}/errored.tfstate"
          rm -rf "${STAGING}/.terraform"
          rm -f  "${STAGING}/.terraform.lock.hcl"

          # Bundle the chart inside the TF source so helm_release can find it
          # without depending on a path outside the upload (Phase 8 will switch
          # to pulling the chart from oci://ghcr.io and remove this step).
          cp -r charts/platforma "${STAGING}/platforma"

          # Rewrite the chart path in app.tf: local dev uses the parent-dir
          # path; the IM bundle has the chart as a sibling.
          sed -i 's|"${path.module}/../../../charts/platforma"|"${path.module}/platforma"|' "${STAGING}/app.tf"
          if ! grep -q '"${path.module}/platforma"' "${STAGING}/app.tf"; then
            echo "ERROR: chart path rewrite did not apply — check app.tf chart reference"
            exit 1
          fi

          # Tarball.
          tar -czf "${{ steps.version.outputs.tarball }}" -C "${STAGING}" .
          ls -lh "${{ steps.version.outputs.tarball }}"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_PUBLISHER_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Upload versioned tarball
        run: |
          gcloud storage cp "${{ steps.version.outputs.tarball }}" \
            "gs://platforma-infrastructure-manager/${{ steps.version.outputs.tarball }}"

      - name: Update latest.tar.gz
        if: steps.version.outputs.update_latest == 'true'
        run: |
          gcloud storage cp "${{ steps.version.outputs.tarball }}" \
            "gs://platforma-infrastructure-manager/platforma-gcp-latest.tar.gz"

      - name: Print published URLs
        run: |
          echo "Versioned: gs://platforma-infrastructure-manager/${{ steps.version.outputs.tarball }}"
          echo "           https://storage.googleapis.com/platforma-infrastructure-manager/${{ steps.version.outputs.tarball }}"
          if [[ "${{ steps.version.outputs.update_latest }}" == "true" ]]; then
            echo "Latest:    gs://platforma-infrastructure-manager/platforma-gcp-latest.tar.gz"
            echo "           https://storage.googleapis.com/platforma-infrastructure-manager/platforma-gcp-latest.tar.gz"
          fi
