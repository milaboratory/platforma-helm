name: Publish Helm Chart

on:
  push:
    branches: [main]
    paths:
      - 'packages/*.tgz'

jobs:
  publish:
    name: Publish to GHCR and update index
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: azure/setup-helm@v4
        with:
          version: 'v3.18.4'

      - name: Detect new packages
        id: detect
        run: |
          NEW_PACKAGES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'packages/*.tgz' || true)
          if [ -z "${NEW_PACKAGES}" ]; then
            echo "No new packages detected"
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "New packages:"
          echo "${NEW_PACKAGES}"

      - name: Log in to GitHub Container Registry
        if: steps.detect.outputs.found == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push new packages to GHCR
        if: steps.detect.outputs.found == 'true'
        run: |
          NEW_PACKAGES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'packages/*.tgz')
          for pkg in ${NEW_PACKAGES}; do
            echo "Pushing ${pkg} to GHCR..."
            helm push "${pkg}" oci://ghcr.io/${{ github.repository }}
          done

      - name: Update Helm repository index
        if: steps.detect.outputs.found == 'true'
        run: |
          if [ -f index.yaml ]; then
            helm repo index packages/ --url https://milaboratory.github.io/platforma-helm/packages/ --merge index.yaml
          else
            helm repo index packages/ --url https://milaboratory.github.io/platforma-helm/packages/
          fi
          mv packages/index.yaml index.yaml

      - name: Push updated index to branch
        if: steps.detect.outputs.found == 'true'
        env:
          GH_CI_HELM: ${{ secrets.GH_CI_HELM }}
        run: |
          BRANCH="auto/update-helm-index-$(date +%s)"
          echo "branch=${BRANCH}" >> "$GITHUB_ENV"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_CI_HELM}@github.com/${{ github.repository }}.git"
          git checkout -b "${BRANCH}"
          git add index.yaml
          git commit -m "release: update helm repository index"
          git push origin "${BRANCH}"

      - name: Create and auto-merge PR
        if: steps.detect.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "release: update helm repository index" \
            --body "Auto-generated: updates index.yaml after new package addition." \
            --base main \
            --head "${branch}"
          gh pr merge "${branch}" --auto --merge
