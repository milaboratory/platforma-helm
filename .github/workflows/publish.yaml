name: Publish Helm Chart

on:
  push:
    branches: [main]
    paths:
      - 'packages/*.tgz'

jobs:
  publish:
    name: Publish to GHCR and update index
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: azure/setup-helm@v4
        with:
          version: 'v3.18.4'

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_ZEN_APP_ID }}
          private-key: ${{ secrets.GH_ZEN_APP_PRIVATE_KEY }}

      - name: Get GitHub App User ID
        id: get-user-id
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"

      - name: Detect new packages
        id: detect
        run: |
          NEW_PACKAGES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'packages/*.tgz' || true)
          if [ -z "${NEW_PACKAGES}" ]; then
            echo "No new packages detected"
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "New packages:"
          echo "${NEW_PACKAGES}"

      - name: Log in to GitHub Container Registry
        if: steps.detect.outputs.found == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push new packages to GHCR
        if: steps.detect.outputs.found == 'true'
        run: |
          NEW_PACKAGES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'packages/*.tgz')
          for pkg in ${NEW_PACKAGES}; do
            echo "Pushing ${pkg} to GHCR..."
            helm push "${pkg}" oci://ghcr.io/${{ github.repository }}
          done

      - name: Update Helm repository index
        if: steps.detect.outputs.found == 'true'
        run: |
          if [ -f index.yaml ]; then
            helm repo index packages/ --url https://milaboratory.github.io/platforma-helm/packages/ --merge index.yaml
          else
            helm repo index packages/ --url https://milaboratory.github.io/platforma-helm/packages/
          fi
          mv packages/index.yaml index.yaml

      - name: Create branch and PR
        if: steps.detect.outputs.found == 'true'
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          USER_ID: ${{ steps.get-user-id.outputs.user-id }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create branch
          BRANCH="auto/update-helm-index-$(date +%s)"
          echo "branch=${BRANCH}" >> "$GITHUB_ENV"
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${APP_TOKEN}@github.com/${{ github.repository }}.git"
          git checkout -b "${BRANCH}"
          git commit --allow-empty -m "release: update helm repository index"
          git push origin "${BRANCH}"

          # Create PR
          gh pr create \
            --title "release: update helm repository index" \
            --body "Auto-generated: updates index.yaml after new package addition." \
            --base main \
            --head "${BRANCH}"
          gh pr merge "${BRANCH}" --auto --merge

          # Push index update to trigger PR checks
          git add index.yaml
          git commit --amend --no-edit
          git push origin --force-with-lease "${BRANCH}"
