license:
  secretName: platforma-license
  secretKey: pl-license-key

app:
  # Disable auth for CI testing — no htpasswd secret needed
  extraArgs:
    - "--no-auth"

resources:
  requests:
    cpu: 1
    memory: 4Gi
  limits:
    cpu: "2"
    memory: 4Gi

volumes:
  storage:
    sizeLimit: 4Gi
  workspace:
    sizeLimit: 2Gi
  database:
    sizeLimit: 2Gi
