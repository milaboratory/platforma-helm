# =============================================================================
# Job Script ConfigMap
# =============================================================================
# Shell script mounted into job containers. Executes the command passed via
# PL_JOB_CMD_AND_ARGS environment variable.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "platforma.fullname" . }}-job-script
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platforma.labels" . | nindent 4 }}
data:
  job_script.sh: |
      #!/bin/sh
      set -e

      # =============================================================================
      # PATH Configuration
      # =============================================================================
      # Prepend PL_JOB_PATH to PATH if set to allow custom binary locations
      # This enables jobs to find executables in custom directories
      if [ -n "${PL_JOB_PATH:-}" ]; then
        export PATH="${PL_JOB_PATH}:${PATH}"
      fi

      # =============================================================================
      # Stderr Redirection Setup
      # =============================================================================
      # Create a named pipe (FIFO) to duplicate stderr output
      # stderr is written to both the specified file and real stderr
      # This allows capturing stderr while maintaining console visibility
      if [ -n "${PL_JOB_STDERR_PATH:-}" ]; then
        STDERR_FIFO=$(mktemp -u /tmp/stderr_fifo.XXXXXX)  # Generate unique FIFO name
        mkfifo "$STDERR_FIFO"                             # Create the named pipe
        exec 4>&2                                         # Save original stderr to fd 4
        tee -a "${PL_JOB_STDERR_PATH}" >&4 < "$STDERR_FIFO" &  # Fork: copy stderr to file and original stderr
        exec 2>"$STDERR_FIFO"                             # Redirect stderr to the FIFO
      fi

      # =============================================================================
      # Stdout Redirection Setup
      # =============================================================================
      # Create a named pipe (FIFO) to duplicate stdout output
      # stdout is written to both the specified file and real stdout
      # If stdout and stderr paths are the same, redirect stdout to stderr
      if [ -n "${PL_JOB_STDOUT_PATH:-}" ]; then
        if [ "${PL_JOB_STDOUT_PATH}" = "${PL_JOB_STDERR_PATH}" ]; then
          exec 1>&2  # Redirect stdout to stderr (already handled above)
        else
          STDOUT_FIFO=$(mktemp -u /tmp/stdout_fifo.XXXXXX)  # Generate unique FIFO name
          mkfifo "$STDOUT_FIFO"                             # Create the named pipe
          exec 3>&1                                         # Save original stdout to fd 3
          tee -a "${PL_JOB_STDOUT_PATH}" >&3 < "$STDOUT_FIFO" &  # Fork: copy stdout to file and original stdout
          exec 1>"$STDOUT_FIFO"                             # Redirect stdout to the FIFO
        fi
      fi

      # =============================================================================
      # Command Execution
      # =============================================================================
      # Execute the job command passed via PL_JOB_CMD_AND_ARGS environment variable
      # Disable 'set -e' temporarily to capture the exit code without exiting
      set +e
      sh -c "$PL_JOB_CMD_AND_ARGS"
      EXIT_CODE=$?

      # =============================================================================
      # Cleanup Resources
      # =============================================================================
      # Clean up stdout redirection if it was set up
      # Restore original stdout, wait for background tee process, and remove FIFO
      if [ -n "${STDOUT_FIFO:-}" ]; then
        exec 1>&3 3>&-  # Restore original stdout and close fd 3
        wait            # Wait for background tee process to finish
        rm -f "$STDOUT_FIFO"  # Remove the temporary FIFO file
      fi

      # Clean up stderr redirection if it was set up
      # Restore original stderr, wait for background tee process, and remove FIFO
      if [ -n "${STDERR_FIFO:-}" ]; then
        exec 2>&4 4>&-  # Restore original stderr and close fd 4
        wait            # Wait for background tee process to finish
        rm -f "$STDERR_FIFO"  # Remove the temporary FIFO file
      fi

      # =============================================================================
      # Exit with Original Command's Exit Code
      # =============================================================================
      exit "$EXIT_CODE"