# =============================================================================
# Job Script ConfigMap
# =============================================================================
# Shell script mounted into job containers. Executes the command passed via
# PL_JOB_CMD_AND_ARGS environment variable.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "platforma.fullname" . }}-job-script
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platforma.labels" . | nindent 4 }}
data:
  job_script.sh: |
    #!/bin/sh
    set -e

    # Prepend PL_JOB_PATH to PATH if set
    if [ -n "${PL_JOB_PATH:-}" ]; then
      export PATH="${PL_JOB_PATH}:${PATH}"
    fi

    # --- Output redirection ---
    # Use tee so output goes to both file AND container stdout/stderr
    # (visible via kubectl logs).

    if [ -n "${PL_JOB_STDOUT_PATH:-}" ] && [ -n "${PL_JOB_STDERR_PATH:-}" ]; then
      if [ "${PL_JOB_STDOUT_PATH}" = "${PL_JOB_STDERR_PATH}" ]; then
        # stdout+stderr to same file, both still visible in kubectl logs
        exec sh -c "$PL_JOB_CMD_AND_ARGS" 2>&1 | tee -a "${PL_JOB_STDOUT_PATH}"
      else
        # separate files: use a named pipe for stderr tee
        STDERR_FIFO=$(mktemp -u /tmp/stderr_fifo.XXXXXX)
        mkfifo "$STDERR_FIFO"
        tee -a "${PL_JOB_STDERR_PATH}" >&2 < "$STDERR_FIFO" &
        sh -c "$PL_JOB_CMD_AND_ARGS" 2>"$STDERR_FIFO" | tee -a "${PL_JOB_STDOUT_PATH}"
        EXIT_CODE=$?
        wait
        rm -f "$STDERR_FIFO"
        exit $EXIT_CODE
      fi
    elif [ -n "${PL_JOB_STDOUT_PATH:-}" ]; then
      exec sh -c "$PL_JOB_CMD_AND_ARGS" | tee -a "${PL_JOB_STDOUT_PATH}"
    elif [ -n "${PL_JOB_STDERR_PATH:-}" ]; then
      STDERR_FIFO=$(mktemp -u /tmp/stderr_fifo.XXXXXX)
      mkfifo "$STDERR_FIFO"
      tee -a "${PL_JOB_STDERR_PATH}" >&2 < "$STDERR_FIFO" &
      sh -c "$PL_JOB_CMD_AND_ARGS" 2>"$STDERR_FIFO"
      EXIT_CODE=$?
      wait
      rm -f "$STDERR_FIFO"
      exit $EXIT_CODE
    else
      exec sh -c "$PL_JOB_CMD_AND_ARGS"
    fi
