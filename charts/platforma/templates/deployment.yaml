# =============================================================================
# Platforma Deployment
# =============================================================================
{{- /* Validate required configuration */ -}}
{{- if ne (include "platforma.workspaceConfigured" .) "true" }}
{{- fail "ERROR: Workspace storage must have exactly ONE option configured.\n\nConfigure ONE of the following in values.yaml:\n  - storage.workspace.existingClaim: \"your-pvc-name\"\n  - storage.workspace.efs.enabled: true (AWS)\n  - storage.workspace.filestore.enabled: true (GCP)\n  - storage.workspace.nfs.enabled: true (generic)\n  - storage.workspace.pvc.enabled: true (generic StorageClass)\n\nIf you enabled multiple options, keep only one.\nSee infrastructure/aws/ or infrastructure/gcp/ for examples." }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "platforma.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platforma.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "platforma.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "platforma.selectorLabels" . | nindent 8 }}
        {{- with .Values.server.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/job-template: {{ include (print $.Template.BasePath "/configmap-job-template-kueue.yaml") . | sha256sum }}
        checksum/watch-config: {{ include (print $.Template.BasePath "/configmap-watch-config.yaml") . | sha256sum }}
        {{- with .Values.server.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "platforma.serviceAccountName" . }}
      securityContext:
        fsGroup: 1010
        runAsNonRoot: true
      {{- if .Values.storage.workspace.chownOnInit }}
      initContainers:
        - name: chown-workspace
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 1010:1010 /data/workspace"]
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 32Mi
          volumeMounts:
            - name: workspace
              mountPath: /data/workspace
      {{- end }}
      containers:
        - name: platforma
          image: {{ include "platforma.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            runAsUser: 1010
            runAsGroup: 1010
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          args:
            # Storage paths
            - "--main-root=/data/main"
            - "--db-dir=/data/database"
            - "--work-dir=/data/workspace/work"
            - "--packages-dir=/data/workspace/packages"
            {{- if eq .Values.storage.main.type "s3" }}
            {{- if .Values.storage.main.s3.endpoint }}
            - "--primary-storage-s3={{ .Values.storage.main.s3.endpoint }}/{{ .Values.storage.main.s3.bucket }}{{ if .Values.storage.main.s3.prefix }}/{{ .Values.storage.main.s3.prefix }}{{ end }}"
            {{- else }}
            - "--primary-storage-s3=s3://{{ .Values.storage.main.s3.bucket }}{{ if .Values.storage.main.s3.prefix }}/{{ .Values.storage.main.s3.prefix }}{{ end }}"
            {{- end }}
            {{- if .Values.storage.main.s3.region }}
            - "--primary-storage-s3-region={{ .Values.storage.main.s3.region }}"
            {{- end }}
            {{- else if eq .Values.storage.main.type "gcs" }}
            - "--primary-storage-gcs=gs://{{ .Values.storage.main.gcs.bucket }}{{ if .Values.storage.main.gcs.prefix }}/{{ .Values.storage.main.gcs.prefix }}{{ end }}"
            {{- if .Values.storage.main.gcs.projectId }}
            - "--primary-storage-gcs-project-id={{ .Values.storage.main.gcs.projectId }}"
            {{- end }}
            {{- if .Values.storage.main.gcs.serviceAccount }}
            - "--primary-storage-gcs-service-account={{ .Values.storage.main.gcs.serviceAccount }}"
            {{- end }}
            {{- end }}
            # K8s runner configuration
            - "--k8s-job-template={{ include "platforma.path.templates" . }}/job-template.yaml"
            - "--k8s-watch-config={{ include "platforma.path.templates" . }}/watch-config.yaml"
            - "--k8s-namespace={{ .Release.Namespace }}"
            {{- if .Values.kueue.maxJobResources }}
            {{- if .Values.kueue.maxJobResources.cpu }}
            - "--k8s-max-cpu-request={{ .Values.kueue.maxJobResources.cpu }}"
            {{- end }}
            {{- if .Values.kueue.maxJobResources.memory }}
            - "--k8s-max-ram-request={{ .Values.kueue.maxJobResources.memory }}"
            {{- end }}
            {{- end }}
            - "--runner-enable-docker"
            # Queue runners (hardcoded — 4 fixed queues, always K8s backend)
            - "--queue-runner=ui-tasks:k8s"
            - "--queue-runner=light:k8s"
            - "--queue-runner=medium:k8s"
            - "--queue-runner=heavy:k8s"
            # Logging
            {{- if .Values.logging.persistence.enabled }}
            - "--log-dst=dir:///var/log/platforma"
            {{- if .Values.logging.persistence.rotation.size }}
            - "--log-rotation-size={{ .Values.logging.persistence.rotation.size }}"
            {{- end }}
            {{- if .Values.logging.persistence.rotation.count }}
            - "--log-rotation-backups={{ .Values.logging.persistence.rotation.count }}"
            {{- end }}
            {{- end }}
            # License file (always mounted from secret)
            - "--license-file={{ include "platforma.path.license" . }}/{{ .Values.license.secretKey }}"
            {{- if .Values.auth.enabled }}
            # Authentication
            {{- if .Values.auth.htpasswd.enabled }}
            - "--auth-htpasswd=/etc/platforma/secrets/htpasswd"
            {{- end }}
            {{- if .Values.auth.ldap.enabled }}
            - "--auth-ldap-server={{ .Values.auth.ldap.server }}"
            {{- if .Values.auth.ldap.startTLS }}
            - "--auth-ldap-start-tls"
            {{- end }}
            {{- /* Mode 1: Direct bind */ -}}
            {{- if .Values.auth.ldap.bindDN }}
            - "--auth-ldap-dn={{ .Values.auth.ldap.bindDN }}"
            {{- end }}
            {{- /* Mode 2: Search bind */ -}}
            {{- range .Values.auth.ldap.searchRules }}
            - "--auth-ldap-search-rule={{ . }}"
            {{- end }}
            {{- if .Values.auth.ldap.searchUser }}
            - "--auth-ldap-search-user={{ .Values.auth.ldap.searchUser }}"
            {{- end }}
            {{- /* TLS options */ -}}
            {{- if .Values.auth.ldap.tls.insecureSkipVerify }}
            - "--auth-ldap-insecure-tls"
            {{- end }}
            {{- if .Values.auth.ldap.tls.caSecretRef.name }}
            - "--auth-ldap-trusted-cas=/etc/platforma/secrets/ldap-ca/{{ .Values.auth.ldap.tls.caSecretRef.key }}"
            {{- end }}
            {{- if .Values.auth.ldap.tls.clientCertSecretRef.name }}
            - "--auth-ldap-client-cert=/etc/platforma/secrets/ldap-client/{{ .Values.auth.ldap.tls.clientCertSecretRef.certKey }},/etc/platforma/secrets/ldap-client/{{ .Values.auth.ldap.tls.clientCertSecretRef.keyKey }}"
            {{- end }}
            {{- end }}
            {{- end }}
            # Disable default host data library (exposes entire pod filesystem)
            - "--no-host-data-library"
            # Data library sources
            {{- range .Values.dataSources }}
            {{- if eq .type "pvc" }}
            - "--data-library-fs={{ .name }}=/data/sources/{{ .name }}"
            {{- else if eq .type "s3" }}
            - "--data-library-s3={{ .name }}=s3://{{ .s3.bucket }}{{ if .s3.prefix }}/{{ .s3.prefix }}{{ end }}"
            {{- if .s3.region }}
            - "--data-library-s3-region={{ .name }}={{ .s3.region }}"
            {{- end }}
            {{- else if eq .type "gcs" }}
            - "--data-library-gcs={{ .name }}=gs://{{ .gcs.bucket }}{{ if .gcs.prefix }}/{{ .gcs.prefix }}{{ end }}"
            {{- if .gcs.projectId }}
            - "--data-library-gcs-project-id={{ .name }}={{ .gcs.projectId }}"
            {{- end }}
            {{- end }}
            {{- end }}
            {{- if .Values.debug.enabled }}
            - "--debug-enabled"
            - "--log-level=debug"
            - "--keep-workdirs=1h"
            - "--debug-port={{ .Values.debug.port }}"
            {{- end }}
            # Extra arguments
            {{- range .Values.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          ports:
            - name: grpc
              containerPort: 6345
              protocol: TCP
            - name: http
              containerPort: 6347
              protocol: TCP
            {{- if .Values.monitoring.enabled }}
            - name: metrics
              containerPort: {{ .Values.monitoring.port }}
              protocol: TCP
            {{- end }}
            {{- if .Values.debug.enabled }}
            - name: debug
              containerPort: {{ .Values.debug.port }}
              protocol: TCP
            {{- end }}
          env:
            # License (env var - supports both PL_LICENSE and MI_LICENSE)
            - name: PL_LICENSE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.license.secretName }}
                  key: {{ .Values.license.secretKey }}
            {{- if and (eq .Values.storage.main.type "s3") .Values.storage.main.s3.secretRef.name }}
            - name: PL_PRIMARY_STORAGE_S3_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.storage.main.s3.secretRef.name }}
                  key: {{ .Values.storage.main.s3.secretRef.accessKeyField }}
            - name: PL_PRIMARY_STORAGE_S3_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.storage.main.s3.secretRef.name }}
                  key: {{ .Values.storage.main.s3.secretRef.secretKeyField }}
            {{- end }}
            {{- if and .Values.auth.enabled .Values.auth.ldap.enabled }}
            {{- if .Values.auth.ldap.searchPassword }}
            - name: PL_AUTH_LDAP_SEARCH_PASSWORD
              value: {{ .Values.auth.ldap.searchPassword | quote }}
            {{- else if .Values.auth.ldap.searchPasswordSecretRef.name }}
            - name: PL_AUTH_LDAP_SEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.ldap.searchPasswordSecretRef.name }}
                  key: {{ .Values.auth.ldap.searchPasswordSecretRef.key }}
            {{- end }}
            {{- end }}
            {{- with .Values.env.variables }}
            # Additional environment variables
            {{- range $key, $value := . }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- end }}
            {{- range .Values.env.secretVariables }}
            - name: {{ .name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .secretName }}
                  key: {{ .secretKey }}
            {{- end }}
            {{- range .Values.env.configMapVariables }}
            - name: {{ .name }}
              valueFrom:
                configMapKeyRef:
                  name: {{ .configMapName }}
                  key: {{ .configMapKey }}
            {{- end }}
          {{- if .Values.server.startupProbe.enabled }}
          startupProbe:
            grpc:
              port: 6345
            initialDelaySeconds: {{ .Values.server.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.server.startupProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.server.startupProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.server.startupProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.server.livenessProbe.enabled }}
          livenessProbe:
            grpc:
              port: 6345
            initialDelaySeconds: {{ .Values.server.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.server.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.server.livenessProbe.timeoutSeconds }}
          {{- end }}
          {{- if .Values.server.readinessProbe.enabled }}
          readinessProbe:
            grpc:
              port: 6345
            initialDelaySeconds: {{ .Values.server.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.server.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.server.readinessProbe.timeoutSeconds }}
          {{- end }}
          resources:
            {{- toYaml .Values.server.resources | nindent 12 }}
          volumeMounts:
            - name: database
              mountPath: {{ include "platforma.path.database" . }}
            - name: workspace
              mountPath: /data/workspace
            - name: main-storage
              mountPath: /data/main
            - name: job-templates
              mountPath: {{ include "platforma.path.templates" . }}/job-template.yaml
              subPath: job-template.yaml
              readOnly: true
            - name: watch-config
              mountPath: {{ include "platforma.path.templates" . }}/watch-config.yaml
              subPath: watch-config.yaml
              readOnly: true
            - name: license
              mountPath: {{ include "platforma.path.license" . }}
              readOnly: true
            {{- if .Values.logging.persistence.enabled }}
            - name: logs
              mountPath: /var/log/platforma
            {{- end }}
            {{- if and .Values.auth.enabled .Values.auth.htpasswd.enabled .Values.auth.htpasswd.secretName }}
            - name: htpasswd
              mountPath: {{ include "platforma.path.secrets" . }}
              readOnly: true
            {{- end }}
            {{- if and .Values.auth.enabled .Values.auth.ldap.enabled .Values.auth.ldap.tls.caSecretRef.name }}
            - name: ldap-ca
              mountPath: {{ include "platforma.path.secrets" . }}/ldap-ca
              readOnly: true
            {{- end }}
            {{- if and .Values.auth.enabled .Values.auth.ldap.enabled .Values.auth.ldap.tls.clientCertSecretRef.name }}
            - name: ldap-client
              mountPath: {{ include "platforma.path.secrets" . }}/ldap-client
              readOnly: true
            {{- end }}
            {{- range .Values.dataSources }}
            {{- if eq .type "pvc" }}
            - name: datasource-{{ .name }}
              mountPath: /data/sources/{{ .name }}
              readOnly: true
            {{- end }}
            {{- end }}
      volumes:
        - name: database
          persistentVolumeClaim:
            claimName: {{ include "platforma.databasePvcName" . }}
        - name: workspace
          persistentVolumeClaim:
            claimName: {{ include "platforma.workspacePvcName" . }}
        - name: main-storage
          emptyDir: {}
        - name: job-templates
          configMap:
            name: {{ include "platforma.fullname" . }}-job-template
        - name: watch-config
          configMap:
            name: {{ include "platforma.fullname" . }}-watch-config
        - name: license
          secret:
            secretName: {{ .Values.license.secretName }}
            items:
              - key: {{ .Values.license.secretKey }}
                path: {{ .Values.license.secretKey }}
        {{- if .Values.logging.persistence.enabled }}
        - name: logs
          persistentVolumeClaim:
            claimName: {{ .Values.logging.persistence.existingClaim | default (printf "%s-logs" (include "platforma.fullname" .)) }}
        {{- end }}
        {{- if and .Values.auth.enabled .Values.auth.htpasswd.enabled .Values.auth.htpasswd.secretName }}
        - name: htpasswd
          secret:
            secretName: {{ .Values.auth.htpasswd.secretName }}
            items:
              - key: {{ .Values.auth.htpasswd.secretKey }}
                path: htpasswd
        {{- end }}
        {{- if and .Values.auth.enabled .Values.auth.ldap.enabled .Values.auth.ldap.tls.caSecretRef.name }}
        - name: ldap-ca
          secret:
            secretName: {{ .Values.auth.ldap.tls.caSecretRef.name }}
        {{- end }}
        {{- if and .Values.auth.enabled .Values.auth.ldap.enabled .Values.auth.ldap.tls.clientCertSecretRef.name }}
        - name: ldap-client
          secret:
            secretName: {{ .Values.auth.ldap.tls.clientCertSecretRef.name }}
        {{- end }}
        {{- range .Values.dataSources }}
        {{- if eq .type "pvc" }}
        - name: datasource-{{ .name }}
          persistentVolumeClaim:
            claimName: {{ .pvc.existingClaim }}
            readOnly: true
        {{- end }}
        {{- end }}
      {{- with .Values.server.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
