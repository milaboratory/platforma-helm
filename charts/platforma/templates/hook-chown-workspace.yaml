# =============================================================================
# Pre-install Hook: chown workspace
# =============================================================================
# Runs for workspace types that don't support native uid/gid:
#   - FSx for Lustre, GCP Filestore, NFS, generic PVC
# NOT needed for:
#   - EFS (StorageClass sets uid/gid via Access Points)
#   - existingClaim (operator manages permissions externally)
# =============================================================================
{{- if or .Values.storage.workspace.fsxLustre.enabled
          .Values.storage.workspace.filestore.enabled
          .Values.storage.workspace.nfs.enabled
          (and .Values.storage.workspace.pvc.enabled
               .Values.storage.workspace.pvc.chownOnCreate) }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "platforma.fullname" . }}-chown-workspace
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platforma.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: hook-succeeded,before-hook-creation
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: chown
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 1010:1010 /data/workspace"]
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 32Mi
          volumeMounts:
            - name: workspace
              mountPath: /data/workspace
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: {{ include "platforma.workspacePvcName" . }}
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
{{- end }}
