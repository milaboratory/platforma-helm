{{/* ---- 4. Additional Data ingress (HTTP/S3) ---- */}}
{{- if and .Values.additionalIngress.enabled .Values.additionalIngress.data.host }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "platforma.fullname" . }}-additional-data
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platforma.labels" . | nindent 4 }}
