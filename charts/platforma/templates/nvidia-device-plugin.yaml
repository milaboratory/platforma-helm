{{- if .Values.kueue.pools.gpu.enabled }}
# =============================================================================
# NVIDIA Device Plugin DaemonSet
# =============================================================================
# Exposes nvidia.com/gpu resources on GPU nodes so the K8s scheduler can
# assign GPU workloads. Only runs on nodes with NVIDIA GPUs.
# Based on: https://github.com/NVIDIA/k8s-device-plugin v0.17.0
# =============================================================================
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "platforma.fullname" . }}-nvidia-device-plugin
  namespace: kube-system
  labels:
    {{- include "platforma.labels" . | nindent 4 }}
    app.kubernetes.io/component: nvidia-device-plugin
spec:
  selector:
    matchLabels:
      name: nvidia-device-plugin-ds
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        name: nvidia-device-plugin-ds
    spec:
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      priorityClassName: system-node-critical
      containers:
        - name: nvidia-device-plugin-ctr
          image: nvcr.io/nvidia/k8s-device-plugin:v0.17.0
          env:
            - name: FAIL_ON_INIT_ERROR
              value: "false"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: device-plugin
              mountPath: /var/lib/kubelet/device-plugins
      volumes:
        - name: device-plugin
          hostPath:
            path: /var/lib/kubelet/device-plugins
{{- end }}
