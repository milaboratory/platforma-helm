{{- if and .Values.logging.persistence.enabled (not .Values.logging.persistence.existingClaim) }}
# =============================================================================
# Logs PVC (for persistent log storage)
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "platforma.fullname" . }}-logs
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platforma.labels" . | nindent 4 }}
    app.kubernetes.io/component: logs
  annotations:
    "helm.sh/resource-policy": keep
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.logging.persistence.storageClass }}
  storageClassName: {{ .Values.logging.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.logging.persistence.size }}
{{- end }}
