---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ include "platforma.workspacePvcName" . }}-pv
  labels:
    {{- include "platforma.labels" . | nindent 4 }}
    app.kubernetes.io/component: workspace
spec:
  capacity:
    storage: 1Ti
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  nfs:
    server: {{ .Values.storage.workspace.nfs.server }}
    path: {{ .Values.storage.workspace.nfs.path | default "/" }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "platforma.workspacePvcName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platforma.labels" . | nindent 4 }}
    app.kubernetes.io/component: workspace
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: {{ include "platforma.workspacePvcName" . }}-pv
  resources:
    requests:
      storage: 1Ti
{{- end }}

{{- if .Values.storage.workspace.pvc.enabled }}
# -- Generic RWX PVC via StorageClass
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "platforma.workspacePvcName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platforma.labels" . | nindent 4 }}
    app.kubernetes.io/component: workspace
spec:
  accessModes:
    - ReadWriteMany
  {{- if .Values.storage.workspace.pvc.storageClass }}
  storageClassName: {{ .Values.storage.workspace.pvc.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.storage.workspace.pvc.size }}
{{- end }}
