{{- if .Values.serviceAccount.create }}
# =============================================================================
# Service Account for Platforma Server
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "platforma.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platforma.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- if .Values.jobServiceAccount.create }}
---
# =============================================================================
# Service Account for Job Pods
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "platforma.jobServiceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platforma.labels" . | nindent 4 }}
  {{- with .Values.jobServiceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
