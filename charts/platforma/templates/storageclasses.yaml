# =============================================================================
# StorageClasses (optional, cluster-scoped)
# =============================================================================
# Created automatically when environment: aws. These are cluster-scoped resources.
# GKE and AKS ship with required StorageClasses pre-configured.
# =============================================================================

{{- if eq .Values.environment "aws" }}
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gp3
  labels:
    {{- include "platforma.labels" . | nindent 4 }}
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: ebs.csi.aws.com
parameters:
  type: gp3
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Delete
allowVolumeExpansion: true
{{- if .Values.storage.workspace.efs.fileSystemId }}
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: efs-platforma
  labels:
    {{- include "platforma.labels" . | nindent 4 }}
provisioner: efs.csi.aws.com
parameters:
  provisioningMode: efs-ap
  fileSystemId: {{ .Values.storage.workspace.efs.fileSystemId }}
  directoryPerms: "755"
  uid: "1010"
  gid: "1010"
  basePath: "/dynamic"
{{- end }}
{{- end }}
