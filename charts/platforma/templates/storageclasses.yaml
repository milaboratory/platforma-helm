# =============================================================================
# StorageClasses (optional, cluster-scoped)
# =============================================================================
# Created only when storageClasses.*.create is true.
# These are cluster-scoped resources — not namespaced.
# =============================================================================

{{- if .Values.storageClasses.gp3.create }}
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: {{ .Values.storageClasses.gp3.name }}
  labels:
    {{- include "platforma.labels" . | nindent 4 }}
provisioner: ebs.csi.aws.com
parameters:
  type: gp3
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Delete
allowVolumeExpansion: true
{{- end }}

{{- if .Values.storageClasses.efs.create }}
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: {{ .Values.storageClasses.efs.name }}
  labels:
    {{- include "platforma.labels" . | nindent 4 }}
provisioner: efs.csi.aws.com
parameters:
  provisioningMode: efs-ap
  fileSystemId: {{ required "storageClasses.efs.fileSystemId is required when storageClasses.efs.create is true" .Values.storageClasses.efs.fileSystemId }}
  directoryPerms: "755"
  uid: {{ .Values.storageClasses.efs.uid | quote }}
  gid: {{ .Values.storageClasses.efs.gid | quote }}
  basePath: "/dynamic"
{{- end }}
