# =============================================================================
# Platforma Helm Chart Values
# =============================================================================
# Platforma is a bioinformatics workflow platform. Key concepts:
#   - Server: The main Platforma pod that manages workflows and state
#   - Jobs: Compute tasks created by Platforma, run as K8s Jobs via Kueue
#   - Queues: ui-tasks (interactive), light/medium/heavy (batch workloads)
#   - Desktop App: Client application that connects to the server via gRPC
#
# Minimum required configuration:
#   1. License secret (see license.secretName)
#   2. Workspace storage (see storage.workspace) - must be RWX
#
# See infrastructure/aws/ and infrastructure/gcp/ for cloud-specific examples.
# =============================================================================

# -- Override chart name
nameOverride: ""
# -- Override full release name
fullnameOverride: ""

# -- Container image configuration
image:
  repository: quay.io/milaboratories/platforma
  tag: ""  # Defaults to Chart.appVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []

# -- License configuration (required)
# The chart reads the secret key (default: MI_LICENSE) and injects it as
# PL_LICENSE env var. Platforma reads both PL_LICENSE and MI_LICENSE env vars.
# File-based licensing is also supported via --license-file flag.
license:
  # -- Existing secret containing the license
  secretName: "platforma-license"
  # -- Key within the secret containing the license
  secretKey: "MI_LICENSE"
  # -- Mount license as file (in addition to env var)
  # When true, uses --license-file flag pointing to /etc/platforma/license/
  file: false

# =============================================================================
# AUTHENTICATION
# =============================================================================

auth:
  # -- Enable authentication (if false, no authentication required)
  enabled: false

  # -- htpasswd file-based authentication
  htpasswd:
    enabled: false
    # -- Existing secret containing htpasswd file
    # Create with: kubectl create secret generic platforma-htpasswd --from-file=htpasswd=./htpasswd
    secretName: ""
    # -- Key in secret containing htpasswd content
    secretKey: "htpasswd"

  # -- LDAP authentication
  # Two modes available:
  #   1. Direct bind: user DN is predictable (bindDN template with %u placeholder)
  #   2. Search bind: search for user first, then bind (searchRules + searchUser)
  ldap:
    enabled: false
    # -- LDAP server address (e.g., ldap://ldap.example.com:389)
    server: ""
    # -- Enable StartTLS
    startTLS: false

    # -- Mode 1: Direct bind
    # DN template where %u is replaced with username
    # Example: "cn=%u,ou=users,dc=example,dc=com"
    bindDN: ""

    # -- Mode 2: Search bind
    # Each rule: "FILTER|BASE_DN" (e.g., "(uid=%s)|ou=users,dc=example,dc=com")
    searchRules: []
    # -- Service account for LDAP search queries
    searchUser: ""
    # -- Search user password (use secretRef for production)
    searchPassword: ""
    # -- Secret containing search user password
    searchPasswordSecretRef:
      name: ""
      key: "password"

    # -- TLS configuration
    tls:
      # -- Skip TLS verification (not recommended for production)
      insecureSkipVerify: false
      # -- CA certificate secret (mounted and passed via --auth-ldap-trusted-cas)
      caSecretRef:
        name: ""
        key: "ca.crt"
      # -- Client certificate for mutual TLS
      # Both cert and key are passed as single flag: --auth-ldap-client-cert=<cert>,<key>
      clientCertSecretRef:
        name: ""
        certKey: "tls.crt"
        keyKey: "tls.key"

# =============================================================================
# STORAGE
# =============================================================================
# Platforma requires three storage areas:
#
# 1. DATABASE (RWO) - RocksDB state database. Stores workflow state, job
#    metadata, and internal indices. Fast local SSD recommended (gp3, pd-ssd).
#    Size: 20-100Gi depending on workflow volume.
#
# 2. WORKSPACE (RWX) - Shared filesystem for job data. Jobs read inputs and
#    write outputs here. MUST be RWX (ReadWriteMany) - EFS, Filestore, NFS.
#    Size: Depends on data volume. This is your working data area.
#
# 3. MAIN (optional) - Long-term result storage exposed to Desktop App.
#    Options: S3 or GCS. Desktop App accesses cloud storage directly.
# =============================================================================

storage:
  # -- RocksDB database storage (RWO) - internal state, NOT user data
  database:
    size: 20Gi
    storageClass: ""
    existingClaim: ""

  # -- Shared workspace for jobs (RWX required)
  # Configure exactly ONE of: existingClaim, efs, fsxLustre, filestore, azureFiles, nfs, pvc
  # Note: Block storage is NOT supported - workspace must be shared (RWX)
  #
  # PERMISSIONS: Platforma runs as non-root (UID/GID from deployment.securityContext).
  # See README.md "Workspace storage" section for per-storage permission setup.
  # Summary:
  #   EFS:        Use "pvc" option with StorageClass that sets uid/gid (recommended)
  #   FSx Lustre: Use "fsxLustre" option + chownOnInit: true
  #   NFS:        Configure server-side ownership, or use chownOnInit: true
  workspace:
    # -- Use existing RWX PVC
    existingClaim: ""

    # -- AWS EFS via static PV (chart creates PV+PVC)
    # For EFS, prefer "pvc" option with a StorageClass that creates Access Points
    # with uid/gid matching deployment.securityContext (see README for example)
    efs:
      enabled: false
      fileSystemId: ""
      path: "/"

    # -- AWS FSx for Lustre (chart creates PV+PVC)
    # Requires chownOnInit: true (FSx has no Access Points for UID/GID enforcement)
    # Requires lustre-client installed on all nodes
    fsxLustre:
      enabled: false
      fileSystemId: ""
      dnsName: ""
      mountName: ""
      path: "/"

    # -- GCP Filestore (chart creates PV+PVC)
    filestore:
      enabled: false
      instanceName: ""
      location: ""
      shareName: ""
      ip: ""
      path: "/"

    # -- Azure Files (chart creates PV+PVC)
    azureFiles:
      enabled: false
      resourceGroup: ""
      storageAccount: ""
      shareName: ""
      secretName: ""
      path: "/"

    # -- Generic NFS server (chart creates PV+PVC)
    nfs:
      enabled: false
      server: ""
      path: "/"

    # -- Generic RWX PVC via StorageClass (e.g., for CSI drivers)
    pvc:
      enabled: false
      size: 100Gi
      storageClass: ""

    # -- Run chown on workspace mount before server starts
    # Required for FSx Lustre. Not needed for EFS with uid/gid StorageClass.
    # The init container runs as root and changes ownership to deployment.securityContext uid/gid.
    chownOnInit: false

  # -- Main storage (exposed to Desktop App)
  # Desktop App downloads results from this storage. Configure S3 or GCS.
  main:
    type: ""  # s3 | gcs

    # -- S3 storage (when type: s3)
    s3:
      bucket: ""
      region: ""
      prefix: ""
      endpoint: ""
      secretRef:
        name: ""
        accessKeyField: "access-key"
        secretKeyField: "secret-key"

    # -- GCS storage (when type: gcs)
    gcs:
      bucket: ""
      projectId: ""
      prefix: ""
      serviceAccount: ""

# -- External read-only data sources (data library)
# Each source gets a --data-library-* CLI flag. PVC sources also get volume mounts.
dataSources: []
  # - name: "sequencing-archive"
  #   type: s3
  #   s3:
  #     bucket: "company-sequencing"
  #     region: "us-east-1"
  #     prefix: ""
  # - name: "reference-genomes"
  #   type: gcs
  #   gcs:
  #     bucket: "reference-data"
  #     projectId: "my-project"
  # - name: "local-data"
  #   type: pvc
  #   pvc:
  #     existingClaim: "shared-data-pvc"

# =============================================================================
# JOB EXECUTION
# =============================================================================
# Platforma has 4 fixed queues with hardcoded priorities:
#   - ui-tasks: Priority 1000 (highest, for interactive tasks)
#   - heavy:    Priority 1000 (high priority batch)
#   - medium:   Priority 100  (normal batch)
#   - light:    Priority 10   (low priority batch)
#
# Each queue is mapped to a runner backend via queueRunners.
# Supported runners: k8s, local
# =============================================================================

# -- Queue to runner backend mapping
# Each key is a queue name, value is the runner type.
queueRunners:
  ui-tasks: k8s
  light: k8s
  medium: k8s
  heavy: k8s

# -- Kueue backend configuration
kueue:
  # -- Mode: dedicated (chart creates all resources) or shared (uses existing queues)
  mode: dedicated  # dedicated | shared

  # -- Maximum resources per job (applies to K8s runner)
  maxJobResources:
    cpu: 64
    memory: 256Gi

  # -- Dedicated mode configuration
  dedicated:
    # -- Node pools configuration
    pools:
      ui:
        # -- Cluster queue resource quota
        resources:
          cpu: 4
          memory: 16Gi
        # -- Node selector for this pool
        # AWS: node.kubernetes.io/pool: ui
        # GKE: pool: ui  (GKE rejects node.kubernetes.io/ prefix)
        nodeSelector: {}
        # -- Tolerations for this pool
        tolerations: []
          # - key: dedicated
          #   value: ui
          #   effect: NoSchedule

      batch:
        resources:
          cpu: 60
          memory: 240Gi
        # AWS: node.kubernetes.io/pool: batch
        # GKE: pool: batch
        nodeSelector: {}
        tolerations: []
          # - key: dedicated
          #   value: batch
          #   effect: NoSchedule

  # -- Shared mode configuration (reference existing Kueue resources)
  shared:
    queues:
      ui: ""       # Existing LocalQueue name for UI tasks
      batch: ""    # Existing LocalQueue name for batch tasks

# -- Internal: Slurm backend (not yet released)
slurm:
  enabled: false

# =============================================================================
# NETWORKING
# =============================================================================

service:
  type: ClusterIP
  # -- gRPC port
  grpcPort: 6345
  # -- HTTP port (S3-compatible API for result downloads)
  httpPort: 6347
  annotations: {}

# -- Ingress configuration
# Platforma exposes two ports:
#   - gRPC (6345): API endpoint — Desktop App connects here
#   - HTTP (6347): S3-compatible data API (when using embedded storage)
#
# Each ingress block has api (gRPC) and data (HTTP) sub-sections.
ingress:
  enabled: false
  className: ""

  # -- gRPC API endpoint (Desktop App connects here)
  api:
    host: ""
    tls:
      enabled: false
      secretName: ""
    annotations: {}
      # nginx.ingress.kubernetes.io/backend-protocol: "GRPC"

  # -- HTTP/S3 data endpoint (when using embedded storage)
  data:
    host: ""
    tls:
      enabled: false
      secretName: ""
    annotations: {}
      # nginx.ingress.kubernetes.io/proxy-body-size: "0"

# -- Additional ingress (e.g., internal network, second region)
# Same structure as ingress. Creates a second pair of api+data ingress resources.
additionalIngress:
  enabled: false
  className: ""

  api:
    host: ""
    tls:
      enabled: false
      secretName: ""
    annotations: {}

  data:
    host: ""
    tls:
      enabled: false
      secretName: ""
    annotations: {}

# =============================================================================
# KUBERNETES CONFIGURATION
# =============================================================================

# -- Service account for Platforma server
serviceAccount:
  create: true
  name: ""
  annotations: {}

# -- Service account for job pods
jobServiceAccount:
  create: true
  name: ""
  annotations: {}

# -- Deployment configuration
deployment:
  podSecurityContext:
    fsGroup: 1010
    runAsNonRoot: true

  securityContext:
    runAsUser: 1010
    runAsGroup: 1010
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]

  strategy:
    type: Recreate

  podLabels: {}
  podAnnotations: {}

# -- Server pod resources
resources:
  requests:
    cpu: 2000m
    memory: 4Gi
  limits:
    cpu: 4000m
    memory: 8Gi

# -- Health probes
probes:
  liveness:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5

  readiness:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3

# -- Additional environment variables
env:
  # -- Plain key-value environment variables
  variables: {}
  # -- Environment variables from secrets
  secretVariables: []
    # - name: SECRET_VAR
    #   secretName: my-secret
    #   secretKey: key
  # -- Environment variables from config maps
  configMapVariables: []

# -- Server pod scheduling
nodeSelector: {}
affinity: {}
tolerations: []

# =============================================================================
# DEBUG
# =============================================================================

# -- Debug mode configuration
debug:
  enabled: false
  port: "9091"

# =============================================================================
# EXTRA CLI ARGUMENTS
# =============================================================================

# -- Additional command-line arguments for Platforma server
# These are passed directly to the platforma binary.
# Use this for advanced configuration or alternative backends.
extraArgs: []
  # Examples:
  # - "--runner-cpu=4"
  # - "--runner-ram=16G"
  # - "--log-level=debug"
  # - "--network-mode=proxy"
  # - "--self-check"

# =============================================================================
# OBSERVABILITY
# =============================================================================

logging:
  # -- Enable persistent log storage
  # When false (default), logs stream to container stderr — collected by the cluster log driver.
  # When true, logs write to a PVC at /var/log/platforma with rotation.
  # Required for log inspection via the debug sidecar during crash loops.
  persistence:
    enabled: false
    size: 10Gi
    storageClass: ""      # "" = cluster default
    existingClaim: ""     # Use pre-created PVC instead of creating one
    rotation:
      size: 1Gi           # Max size per log file before rotation
      count: 15           # Number of rotated log files to keep

monitoring:
  # -- Enable metrics endpoint
  enabled: true
  # -- Metrics port
  port: 9090

  service:
    type: ClusterIP
    annotations: {}

  # -- PodMonitoring for GKE/GMP
  podMonitoring:
    enabled: false
    interval: 30s

# =============================================================================
# BUNDLED CONTROLLERS (optional, AWS EKS)
# =============================================================================
# Sub-charts for AWS-specific controllers. All disabled by default.
# Enable in AWS deployments to avoid separate Helm installs for each controller.
# Provide IRSA role ARNs from CloudFormation Outputs via serviceAccount.annotations.
# =============================================================================

# -- Cluster Autoscaler
# Scales EC2 node groups when pods are pending. Required for UI and batch pools
# that start at 0 nodes.
cluster-autoscaler:
  enabled: false
  autoDiscovery:
    clusterName: ""   # Set to EKS cluster name (ClusterName from CF outputs)
  awsRegion: ""       # Set to AWS region (Region from CF outputs)
  rbac:
    serviceAccount:
      create: true
      annotations: {}  # eks.amazonaws.com/role-arn: <AutoscalerRoleArn>
  extraArgs:
    scale-down-delay-after-add: 10m
    scale-down-unneeded-time: 10m
    scale-down-utilization-threshold: "0.5"
    expander: least-waste

# -- AWS Load Balancer Controller
# Creates Application Load Balancers from Kubernetes Ingress resources.
aws-load-balancer-controller:
  enabled: false
  clusterName: ""     # Set to EKS cluster name
  serviceAccount:
    create: true
    annotations: {}   # eks.amazonaws.com/role-arn: <ALBControllerRoleArn>

# -- External DNS
# Manages Route53 DNS records from Kubernetes Ingress annotations.
external-dns:
  enabled: false
  policy: upsert-only
  registry: txt
  txtOwnerId: ""      # Set to EKS cluster name
  domainFilters: []   # Set to root domain (e.g. [example.com])
  serviceAccount:
    create: true
    annotations: {}   # eks.amazonaws.com/role-arn: <ExternalDNSRoleArn>

# =============================================================================
# STORAGE CLASSES (AWS EKS)
# =============================================================================
# Optional StorageClasses to create alongside the release. AWS EKS only —
# GKE and AKS ship with the required StorageClasses pre-configured.
# These are cluster-scoped resources — created once per cluster, not per release.
# =============================================================================

# -- StorageClasses to create with this release
storageClasses:
  # -- AWS gp3 EBS StorageClass
  # Required on EKS for database storage when no gp3 StorageClass exists.
  gp3:
    create: false
    name: gp3

  # -- AWS EFS StorageClass (dynamic provisioning via EFS Access Points)
  # Required on EKS for workspace storage when using storage.workspace.pvc with EFS.
  # Sets uid/gid on Access Points to match Platforma's container user.
  efs:
    create: false
    name: efs-platforma
    fileSystemId: ""  # Required when create: true (e.g., fs-0123456789abcdef)
    uid: "1010"       # Must match deployment.securityContext.runAsUser
    gid: "1010"       # Must match deployment.securityContext.runAsGroup

# =============================================================================
# JOB CONFIGURATION
# =============================================================================

# -- Job pod configuration (passed to job template)
jobs:
  # -- Secret containing environment variables for job pods
  # The operator pre-creates this secret with all needed credentials.
  # Currently contains MI_LICENSE; extensible for future secrets.
  secretName: "platforma-license"

  # -- Security context for job containers
  securityContext:
    runAsUser: 1010
    runAsGroup: 1010

  # -- Additional volume mounts for job pods
  extraVolumeMounts: []

  # -- Additional volumes for job pods
  extraVolumes: []
