# =============================================================================
# Platforma Helm Chart Values
# =============================================================================
# Platforma is a bioinformatics workflow platform. Key concepts:
#   - App: The main Platforma pod that manages workflows and state
#   - Jobs: Compute tasks created by Platforma, run as K8s Jobs via Kueue
#   - Queues: ui-tasks (interactive), light/medium/heavy (batch workloads)
#   - Desktop App: Client application that connects to the server via gRPC
#
# Minimum required configuration:
#   1. provider (aws or gcp)
#   2. Auth (htpasswd secretName or LDAP server)
#   3. License secret (see license.secretName)
#   4. Workspace storage (see storage.workspace) - must be RWX
#   5. Main storage bucket (see storage.main.s3 or storage.main.gcs)
#
# See infrastructure/aws/ and infrastructure/gcp/ for cloud-specific examples.
# =============================================================================

# -- Override chart name
nameOverride: ""
# -- Override full release name
fullnameOverride: ""

# -- Container image configuration
image:
  repository: quay.io/milaboratories/platforma
  tag: ""  # Defaults to Chart.appVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []

# =============================================================================
# PROVIDER
# =============================================================================
# Determines cloud-specific StorageClasses and primary storage backend.
#   aws: creates gp3 StorageClass (EBS), efs-platforma StorageClass (if
#        efsFileSystemId set). Primary storage: S3.
#   gcp: no auto-created resources (GKE ships with required StorageClasses).
#        Primary storage: GCS.
# =============================================================================

# -- Cloud provider (REQUIRED: aws | gcp)
provider: ""

# -- AWS-specific configuration
aws:
  # -- EFS file system ID for dynamic workspace provisioning via StorageClass
  # When set (and provider: aws), creates an EFS StorageClass with uid/gid 1010
  # Example: fs-0123456789abcdef
  efsFileSystemId: ""

# =============================================================================
# LICENSE
# =============================================================================

# -- License configuration (required)
# The chart reads the secret key (default: MI_LICENSE) and mounts it both as
# an env var (PL_LICENSE) and as a file (--license-file).
license:
  # -- Existing secret containing the license
  secretName: "platforma-license"
  # -- Key within the secret containing the license
  secretKey: "MI_LICENSE"

# =============================================================================
# AUTHENTICATION
# =============================================================================
# Authentication is mandatory. Configure exactly one method:
#   - htpasswd: Set auth.htpasswd.secretName to enable
#   - LDAP: Set auth.ldap.server to enable
# Helm fails if neither is configured.
# To disable auth for development, pass --no-auth via app.extraArgs.

auth:
  # -- htpasswd file-based authentication
  htpasswd:
    # -- Existing secret containing htpasswd file (set to enable htpasswd auth)
    # Create with: kubectl create secret generic platforma-htpasswd --from-file=htpasswd=./htpasswd
    secretName: ""
    # -- Key in secret containing htpasswd content
    secretKey: "htpasswd"

  # -- LDAP authentication
  # Two modes available:
  #   1. Direct bind: user DN is predictable (bindDN template with %u placeholder)
  #   2. Search bind: search for user first, then bind (searchRules + searchUser)
  ldap:
    # -- LDAP server address (set to enable LDAP auth)
    # Example: ldap://ldap.example.com:389
    server: ""
    # -- Enable StartTLS
    startTLS: false

    # -- Mode 1: Direct bind
    # DN template where %u is replaced with username
    # Example: "cn=%u,ou=users,dc=example,dc=com"
    bindDN: ""

    # -- Mode 2: Search bind
    # Each rule: "FILTER|BASE_DN" (e.g., "(uid=%s)|ou=users,dc=example,dc=com")
    searchRules: []
    # -- Service account for LDAP search queries
    searchUser: ""
    # -- Search user password (use secretRef for production)
    searchPassword: ""
    # -- Secret containing search user password
    searchPasswordSecretRef:
      name: ""
      key: "password"

    # -- TLS configuration
    tls:
      # -- Skip TLS verification (not recommended for production)
      insecureSkipVerify: false
      # -- CA certificate secret (mounted and passed via --auth-ldap-trusted-cas)
      caSecretRef:
        name: ""
        key: "ca.crt"
      # -- Client certificate for mutual TLS
      # Both cert and key are passed as single flag: --auth-ldap-client-cert=<cert>,<key>
      clientCertSecretRef:
        name: ""
        certKey: "tls.crt"
        keyKey: "tls.key"

# =============================================================================
# STORAGE
# =============================================================================
# Platforma requires three storage areas:
#
# 1. DATABASE (RWO) - RocksDB state database. Stores workflow state, job
#    metadata, and internal indices. Fast local SSD recommended (gp3, pd-ssd).
#    Size: 20-100Gi depending on workflow volume.
#
# 2. WORKSPACE (RWX) - Shared filesystem for job data. Jobs read inputs and
#    write outputs here. MUST be RWX (ReadWriteMany) - EFS, Filestore, NFS.
#    Size: Depends on data volume. This is your working data area.
#
# 3. MAIN - Long-term result storage exposed to Desktop App.
#    Determined by provider: aws → S3, gcp → GCS.
# =============================================================================

storage:
  # -- RocksDB database storage (RWO) - internal state, NOT user data
  database:
    size: 20Gi
    storageClass: ""
    existingClaim: ""

  # -- Shared workspace for jobs (RWX required)
  # Configure exactly ONE of: existingClaim, efs, fsxLustre, filestore, nfs, pvc
  # Note: Block storage is NOT supported - workspace must be shared (RWX)
  workspace:
    # -- Use existing RWX PVC
    existingClaim: ""

    # -- AWS EFS via static PV (chart creates PV+PVC)
    efs:
      enabled: false
      fileSystemId: ""
      path: "/"

    # -- AWS FSx for Lustre (chart creates PV+PVC)
    # Requires lustre-client installed on all nodes.
    # Permissions: a pre-install hook automatically chowns the workspace to UID/GID 1010.
    fsxLustre:
      enabled: false
      fileSystemId: ""
      dnsName: ""
      mountName: ""

    # -- GCP Filestore (chart creates PV+PVC)
    # Permissions: a pre-install hook automatically chowns the workspace to UID/GID 1010.
    filestore:
      enabled: false
      instanceName: ""
      location: ""
      shareName: ""
      ip: ""
      path: "/"

    # -- Generic NFS server (chart creates PV+PVC)
    # Permissions: a pre-install hook automatically chowns the workspace to UID/GID 1010.
    nfs:
      enabled: false
      server: ""
      path: "/"

    # -- Generic RWX PVC via StorageClass (e.g., for CSI drivers)
    # Permissions: a pre-install hook automatically chowns the workspace to UID/GID 1010.
    pvc:
      enabled: false
      size: 100Gi
      storageClass: ""

  # -- Main storage (exposed to Desktop App)
  # Desktop App downloads results from this storage.
  # Backend is determined by provider: aws → S3 (configure s3.*), gcp → GCS (configure gcs.*).
  main:
    # -- S3 storage (when provider: aws)
    s3:
      bucket: ""
      region: ""
      prefix: ""
      endpoint: ""
      secretRef:
        name: ""
        accessKeyField: "access-key"
        secretKeyField: "secret-key"

    # -- GCS storage (when provider: gcp)
    gcs:
      bucket: ""
      projectId: ""
      prefix: ""
      serviceAccount: ""

# -- External read-only data sources (data library)
# Each source gets a --data-library-* CLI flag. PVC sources also get volume mounts.
dataSources: []
  # - name: "sequencing-archive"
  #   type: s3
  #   s3:
  #     bucket: "company-sequencing"
  #     region: "us-east-1"
  #     prefix: ""
  # - name: "reference-genomes"
  #   type: gcs
  #   gcs:
  #     bucket: "reference-data"
  #     projectId: "my-project"
  # - name: "local-data"
  #   type: pvc
  #   pvc:
  #     existingClaim: "shared-data-pvc"

# =============================================================================
# JOB EXECUTION (Kueue)
# =============================================================================
# Platforma has 4 fixed queues with hardcoded priorities:
#   - ui-tasks: Priority 1000 (highest, for interactive tasks)
#   - heavy:    Priority 1000 (high priority batch)
#   - medium:   Priority 100  (normal batch)
#   - light:    Priority 10   (low priority batch)
#
# Two modes:
#   dedicated: Chart creates ClusterQueues, LocalQueues, ResourceFlavors,
#              and WorkloadPriorityClasses. Use when Platforma owns the cluster
#              or has a dedicated namespace.
#   shared:    Chart references existing Kueue queues. Use when a cluster admin
#              manages Kueue resources centrally for multiple tenants.
# =============================================================================

kueue:
  # -- Mode: dedicated (chart creates all resources) or shared (uses existing queues)
  mode: dedicated  # dedicated | shared

  # -- Maximum resources per job (applies to K8s runner)
  maxJobResources:
    cpu: 64
    memory: 256Gi

  # -- Dedicated mode configuration
  # Creates two node pools: UI (interactive) and Batch (compute).
  # UI pool resources are guaranteed (borrowingLimit: 0).
  # Batch pool can borrow idle UI capacity.
  dedicated:
    # -- When false, skip cluster-scoped resources (ResourceFlavors, ClusterQueues, WorkloadPriorityClasses).
    # LocalQueues and ConfigMap are always created. Set to false for secondary installs
    # sharing Kueue infrastructure with a primary install.
    createClusterResources: true
    # -- Name prefix for cluster-scoped resources.
    # All installs sharing Kueue infrastructure must use the same value.
    # Default (empty): uses the Helm release fullname.
    clusterResourceName: ""
    pools:
      ui:
        # -- Cluster queue resource quota
        resources:
          cpu: 4
          memory: 16Gi
        # -- Node selector for this pool
        # AWS: node.kubernetes.io/pool: ui
        # GKE: pool: ui  (GKE rejects node.kubernetes.io/ prefix)
        nodeSelector: {}
        # -- Tolerations for this pool
        tolerations: []
          # - key: dedicated
          #   value: ui
          #   effect: NoSchedule

      batch:
        resources:
          cpu: 60
          memory: 240Gi
        # AWS: node.kubernetes.io/pool: batch
        # GKE: pool: batch
        nodeSelector: {}
        tolerations: []
          # - key: dedicated
          #   value: batch
          #   effect: NoSchedule

  # -- Shared mode configuration
  # References externally-managed Kueue cluster resources.
  # User must create ClusterQueues, ResourceFlavors, and WorkloadPriorityClasses outside the chart.
  # Chart creates LocalQueues per namespace pointing at the specified ClusterQueues.
  shared:
    # -- ClusterQueue names to reference (chart creates LocalQueues pointing at these)
    clusterQueues:
      ui: ""       # ClusterQueue name for UI tasks
      batch: ""    # ClusterQueue name for batch tasks
    # -- WorkloadPriorityClass names (must exist in cluster)
    priorities:
      uiTasks: ""
      high: ""
      normal: ""
      low: ""

# =============================================================================
# NETWORKING
# =============================================================================

service:
  type: ClusterIP
  annotations: {}

# -- Ingress configuration
# Platforma exposes gRPC on port 6345 — Desktop App connects here.
# For ALB with gRPC, use annotations:
#   alb.ingress.kubernetes.io/backend-protocol-version: GRPC
ingress:
  enabled: false
  className: ""
  # -- Hostname for the gRPC API endpoint
  host: ""
  tls:
    enabled: false
    secretName: ""
  annotations: {}

# -- Additional ingress (e.g., internal network, second region)
# Same structure as ingress. Creates a second ingress resource.
additionalIngress:
  enabled: false
  className: ""
  host: ""
  tls:
    enabled: false
    secretName: ""
  annotations: {}

# =============================================================================
# APPLICATION
# =============================================================================
# All configuration for the Platforma application: resources, probes,
# scheduling, environment, logging, monitoring, and debug.
# Security context is hardcoded (UID/GID 1010 — set by the container image).
# =============================================================================

app:
  # -- Pod resources
  resources:
    requests:
      cpu: 2000m
      memory: 4Gi
    limits:
      cpu: 4000m
      memory: 8Gi

  # -- Pod scheduling
  nodeSelector: {}
  affinity: {}
  tolerations: []

  # -- Extra labels/annotations for the pod
  podLabels: {}
  podAnnotations: {}

  # -- Additional environment variables
  env:
    # -- Plain key-value environment variables
    variables: {}
    # -- Environment variables from secrets
    secretVariables: []
      # - name: SECRET_VAR
      #   secretName: my-secret
      #   secretKey: key
    # -- Environment variables from config maps
    configMapVariables: []

  # -- Additional command-line arguments for Platforma binary
  extraArgs: []
    # Examples:
    # - "--runner-cpu=4"
    # - "--runner-ram=16G"
    # - "--network-mode=proxy"

  # -- Debug mode
  # The debug API (pprof, DB inspection) always runs on port 9091.
  # When enabled: binds on 0.0.0.0 (accessible via port-forward), sets log
  # level to debug, keeps job workdirs for 1h.
  # When disabled: binds on 127.0.0.1 (pod-internal only).
  debug:
    enabled: false

  # -- Logging configuration
  logging:
    # -- Enable persistent log storage
    # When false (default), logs stream to container stderr — collected by the cluster log driver.
    # When true, logs write to a PVC at /var/log/platforma with rotation.
    persistence:
      enabled: false
      size: 10Gi
      storageClass: ""      # "" = cluster default
      existingClaim: ""     # Use pre-created PVC instead of creating one
      rotation:
        size: 1Gi           # Max size per log file before rotation
        count: 15           # Number of rotated log files to keep

  # -- Monitoring configuration
  # Platforma exposes Prometheus metrics on port 9090 (hardcoded in backend).
  # A ClusterIP metrics service is always created on port 9090.
  #
  # To enable Prometheus scraping, add annotations:
  #   app:
  #     monitoring:
  #       annotations:
  #         prometheus.io/scrape: "true"
  #         prometheus.io/port: "9090"
  #
  # For GKE with Google Managed Prometheus, enable podMonitoring below.
  # For AWS/generic clusters, configure a ServiceMonitor separately.
  monitoring:
    # -- Annotations for the metrics service
    annotations: {}
    # -- PodMonitoring for GKE/GMP (Google Managed Prometheus)
    podMonitoring:
      enabled: false
      interval: 30s

  # -- Startup probe (for long bootstrap on large datasets)
  # Allows up to 30 minutes for initial startup (periodSeconds * failureThreshold).
  startupProbe:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 60  # 30 * 60 = 1800s = 30 minutes

  # -- Liveness probe
  livenessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5

  # -- Readiness probe
  readinessProbe:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3

# =============================================================================
# SERVICE ACCOUNTS
# =============================================================================

# -- Service account for Platforma server
serviceAccount:
  create: true
  name: ""
  annotations: {}

# -- Service account for job pods
jobServiceAccount:
  create: true
  name: ""
  annotations: {}

# =============================================================================
# JOB CONFIGURATION
# =============================================================================

# -- Job pod configuration (passed to job template)
jobs:
  # -- Secret containing environment variables for job pods
  # The operator pre-creates this secret with all needed credentials.
  # Currently contains MI_LICENSE; extensible for future secrets.
  secretName: "platforma-license"
