# =============================================================================
# htpasswd Secret (auto-generated from inline credentials)
# =============================================================================
# Created only when auth.htpasswd.credentials is set.
# When using auth.htpasswd.secretName, this template is skipped.
# =============================================================================

{{- if and (gt (len .Values.auth.htpasswd.credentials) 0) (not .Values.auth.htpasswd.secretName) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "platforma.fullname" . }}-htpasswd
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platforma.labels" . | nindent 4 }}
    app.kubernetes.io/component: auth
type: Opaque
data:
  {{ .Values.auth.htpasswd.secretKey }}: {{ include "platforma.htpasswdFileContent" . | b64enc }}
{{- end }}
