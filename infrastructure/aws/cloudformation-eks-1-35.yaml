  # ---------------------------------------------------------------------------
  # 5. EKS managed addons
  # ---------------------------------------------------------------------------

  # Core networking addons — takes over from EKS auto-installed self-managed
  # versions, giving version governance and automatic upgrade compatibility.
  VpcCniAddon:
    Type: AWS::EKS::Addon
    Properties:
      ClusterName: !Ref EksCluster
      AddonName: vpc-cni
      ResolveConflicts: OVERWRITE
      Tags:
        - Key: platforma
          Value: !Ref ClusterName

  KubeProxyAddon:
    Type: AWS::EKS::Addon
    Properties:
      ClusterName: !Ref EksCluster
      AddonName: kube-proxy
      ResolveConflicts: OVERWRITE
      Tags:
        - Key: platforma
          Value: !Ref ClusterName

  CoreDnsAddon:
    Type: AWS::EKS::Addon
    DependsOn: SystemNodeGroupV3
    Properties:
      ClusterName: !Ref EksCluster
      AddonName: coredns
      ResolveConflicts: OVERWRITE
      Tags:
        - Key: platforma
          Value: !Ref ClusterName

  # CSI drivers (DependsOn: SystemNodeGroupV3 for running pods)
  EbsCsiAddon:
    Type: AWS::EKS::Addon
    DependsOn: SystemNodeGroupV3
    Properties:
      ClusterName: !Ref EksCluster
      AddonName: aws-ebs-csi-driver
      ServiceAccountRoleArn: !GetAtt EbsCsiDriverRole.Arn
      ResolveConflicts: OVERWRITE
      Tags:
        - Key: platforma
          Value: !Ref ClusterName

  EfsCsiAddon:
    Type: AWS::EKS::Addon
    DependsOn: SystemNodeGroupV3
    Properties:
      ClusterName: !Ref EksCluster
      AddonName: aws-efs-csi-driver
      ServiceAccountRoleArn: !GetAtt EfsCsiDriverRole.Arn
      ResolveConflicts: OVERWRITE
      Tags:
        - Key: platforma
          Value: !Ref ClusterName

  # ---------------------------------------------------------------------------
  # 5b. Helm deployer — two CodeBuild projects + shared Lambda trigger
  #     HelmDeployerProject:          infra controllers (Kueue, AppWrapper,
  #                                   Autoscaler, ExternalDNS, ALB). Keeps
  #                                   the existing project name for in-place
  #                                   update on existing stacks.
  #     PlatformaDeployerProject:     Platforma only.
  #     One shared Lambda reads CodeBuildProject from event ResourceProperties
  #     to know which project to start. One shared IAM role for both projects.
  #     TriggerPlatformaDeploy DependsOn TriggerHelmDeploy (infra first).
  # ---------------------------------------------------------------------------

  HelmDeployerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ClusterName}-${AWS::Region}-helm-deployer'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: HelmDeployerPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - eks:DescribeCluster
                Resource: !Sub 'arn:aws:eks:${AWS::Region}:${AWS::AccountId}:cluster/${ClusterName}'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:PutRetentionPolicy
                Resource:
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/${ClusterName}-helm-deployer:*'
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/${ClusterName}-platforma-deployer:*'
              # Store/retrieve auto-generated users password in SSM Parameter Store
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:PutParameter
                  - ssm:DeleteParameter
                Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ClusterName}/platforma/*'
              # Teardown: delete ALBs, TGs, and SGs that ALB Controller created outside CF
              - Effect: Allow
                Action:
                  - tag:GetResources
                Resource: '*'
              - Effect: Allow
                Action:
                  - elasticloadbalancing:DeleteLoadBalancer
                  - elasticloadbalancing:DeleteTargetGroup
                Resource:
                  - !Sub 'arn:aws:elasticloadbalancing:${AWS::Region}:${AWS::AccountId}:loadbalancer/app/*/*'
                  - !Sub 'arn:aws:elasticloadbalancing:${AWS::Region}:${AWS::AccountId}:targetgroup/*/*'
              - Effect: Allow
                Action:
                  - ec2:DescribeSecurityGroups
                  - ec2:DescribeSecurityGroupRules
                  - ec2:DeleteSecurityGroup
                  - ec2:RevokeSecurityGroupIngress
                  - ec2:RevokeSecurityGroupEgress
                Resource: '*'
              - Effect: Allow
                Action:
                  - servicequotas:GetServiceQuota
                Resource: '*'
      Tags:
        - Key: platforma
          Value: !Ref ClusterName

  HelmDeployerAccessEntry:
    Type: AWS::EKS::AccessEntry
    DependsOn: EksCluster
    Properties:
      ClusterName: !Ref EksCluster
      PrincipalArn: !GetAtt HelmDeployerRole.Arn
      Type: STANDARD
      AccessPolicies:
        - PolicyArn: arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy
          AccessScope:
            Type: cluster

  # IMPORTANT: This CodeBuild project runs on the public internet and connects
  # to the EKS API via the public endpoint (EndpointPublicAccess: true).
  # If you restrict the cluster to private-only access, you must add a VpcConfig
  # to this project (security group, subnets, NAT Gateway route).
  HelmDeployerProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub '${ClusterName}-helm-deployer'
      ServiceRole: !GetAtt HelmDeployerRole.Arn
      TimeoutInMinutes: 30
      Artifacts:
        Type: NO_ARTIFACTS
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
        EnvironmentVariables:
          - Name: CLUSTER_NAME
            Value: !Ref ClusterName
          - Name: REGION
            Value: !Ref AWS::Region
          - Name: NAMESPACE
            Value: !Ref PlatformaNamespace
          - Name: AUTOSCALER_ROLE_ARN
            Value: !GetAtt AutoscalerIrsaRole.Arn
          - Name: VPC_ID
            Value: !If [CreateNewVpc, !Ref Vpc, !Ref VpcId]
          - Name: ALB_ROLE_ARN
            Value: !GetAtt ALBControllerRole.Arn
          - Name: EXTERNALDNS_ROLE_ARN
            Value: !GetAtt ExternalDNSRole.Arn
          - Name: HOSTED_ZONE_ID
            Value: !Ref HostedZoneId
          - Name: KUBERNETES_VERSION
            Value: !FindInMap [Constants, EKS, Version]
          - Name: KUEUE_VERSION
            Value: '0.16.1'
          - Name: APPWRAPPER_VERSION
            Value: 'v1.2.0'
          - Name: CLUSTER_AUTOSCALER_CHART_VERSION
            Value: '9.56.0'
          - Name: EXTERNAL_DNS_VERSION
            Value: '1.20.0'
          - Name: ALB_CONTROLLER_VERSION
            Value: '3.0.0'
      Tags:
        - Key: platforma
          Value: !Ref ClusterName
      Source:
        Type: NO_SOURCE
        BuildSpec: |
          version: 0.2
          phases:
            install:
              commands:
                # Install kubectl
                - curl -sLO "https://dl.k8s.io/release/v${KUBERNETES_VERSION}.0/bin/linux/amd64/kubectl"
                - chmod +x kubectl && mv kubectl /usr/local/bin/
                # Install Helm
                - curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
                # Configure kubeconfig
                - aws eks update-kubeconfig --name $CLUSTER_NAME --region $REGION
            build:
              commands:
                # Build phase: 6 blocks, each with its own CloudWatch log section.
                # Block 0 = teardown; blocks 1-5 = install steps.
                # CodeBuild stops automatically on the first block that fails.

                # --- Block 0: TEARDOWN (exits 0 immediately when TEARDOWN=false) ---
                - |
                  [ "${TEARDOWN:-false}" != "true" ] && exit 0
                  echo "=== INFRA TEARDOWN ==="
                  helm uninstall aws-load-balancer-controller -n $NAMESPACE --ignore-not-found --wait --timeout 3m || true
                  echo "Waiting 30s for External DNS to sync DNS record deletion..."
                  sleep 30
                  helm uninstall external-dns -n $NAMESPACE --ignore-not-found --wait --timeout 3m || true
                  helm uninstall cluster-autoscaler -n $NAMESPACE --ignore-not-found --wait --timeout 3m || true
                  helm uninstall kueue -n kueue-system --ignore-not-found --wait --timeout 3m || true
                  kubectl delete appwrappers --all -A --ignore-not-found || true
                  kubectl delete -f https://github.com/project-codeflare/appwrapper/releases/download/$APPWRAPPER_VERSION/install.yaml \
                    --ignore-not-found || true
                  echo "Infra teardown complete."
                  exit 0

                # --- Block 1: LOG RETENTION ---
                - |
                  [ "${TEARDOWN:-false}" = "true" ] && exit 0
                  echo "=== [1/5] LOG RETENTION ==="
                  aws logs put-retention-policy --log-group-name "/aws/codebuild/${CLUSTER_NAME}-helm-deployer" --retention-in-days 30 --region $REGION 2>/dev/null || true
                  aws logs put-retention-policy --log-group-name "/aws/codebuild/${CLUSTER_NAME}-platforma-deployer" --retention-in-days 30 --region $REGION 2>/dev/null || true
                  aws logs put-retention-policy --log-group-name "/aws/lambda/${CLUSTER_NAME}-helm-trigger" --retention-in-days 14 --region $REGION 2>/dev/null || true

                # --- Block 2: KUEUE + APPWRAPPER ---
                - |
                  [ "${TEARDOWN:-false}" = "true" ] && exit 0
                  echo "=== [2/5] KUEUE + APPWRAPPER ==="
                  helm upgrade --install kueue oci://registry.k8s.io/kueue/charts/kueue \
                    --version $KUEUE_VERSION \
                    -n kueue-system --create-namespace \
                    --set controllerManager.manager.resources.limits.cpu=500m \
                    --set controllerManager.manager.resources.limits.memory=512Mi \
                    --set controllerManager.manager.resources.requests.cpu=100m \
                    --set controllerManager.manager.resources.requests.memory=256Mi \
                    --set featureGates.AppWrapper=true \
                    --set 'integrations.frameworks[0]=batch/job' \
                    --set 'integrations.frameworks[1]=jobset.x-k8s.io/jobset' \
                    --set 'integrations.frameworks[2]=workload.codeflare.dev/appwrapper' \
                    --set 'integrations.podOptions.namespaceSelector.matchExpressions[0].key=kubernetes.io/metadata.name' \
                    --set 'integrations.podOptions.namespaceSelector.matchExpressions[0].operator=NotIn' \
                    --set 'integrations.podOptions.namespaceSelector.matchExpressions[0].values[0]=kube-system' \
                    --set 'integrations.podOptions.namespaceSelector.matchExpressions[0].values[1]=kueue-system' \
                    --set metrics.enableClusterQueueResources=true \
                    --atomic --timeout 5m
                  kubectl apply --server-side -f https://github.com/project-codeflare/appwrapper/releases/download/$APPWRAPPER_VERSION/install.yaml
                  kubectl wait --for=condition=Available deployment/appwrapper-controller-manager -n appwrapper-system --timeout=120s
                  kubectl delete validatingwebhookconfiguration appwrapper-validating-webhook-configuration --ignore-not-found
                  kubectl delete mutatingwebhookconfiguration appwrapper-mutating-webhook-configuration --ignore-not-found

                # --- Block 3: CLUSTER AUTOSCALER ---
                - |
                  [ "${TEARDOWN:-false}" = "true" ] && exit 0
                  echo "=== [3/5] CLUSTER AUTOSCALER ==="
                  helm repo add autoscaler https://kubernetes.github.io/autoscaler
                  helm repo update
                  helm upgrade --install cluster-autoscaler autoscaler/cluster-autoscaler \
                    --version $CLUSTER_AUTOSCALER_CHART_VERSION \
                    --set image.tag=v$KUBERNETES_VERSION.0 \
                    -n $NAMESPACE --create-namespace \
                    --set autoDiscovery.clusterName=$CLUSTER_NAME \
                    --set awsRegion=$REGION \
                    --set rbac.serviceAccount.create=true \
                    --set rbac.serviceAccount.name=cluster-autoscaler \
                    --set "rbac.serviceAccount.annotations.eks\.amazonaws\.com/role-arn=$AUTOSCALER_ROLE_ARN" \
                    --set "autoDiscovery.tags[0]=eks:cluster-name=$CLUSTER_NAME" \
                    --set extraArgs.scale-down-delay-after-add=10m \
                    --set extraArgs.scale-down-unneeded-time=10m \
                    --set extraArgs.scale-down-utilization-threshold=0.5 \
                    --set extraArgs.expander=least-waste \
                    --set extraArgs.max-node-provision-time=5m \
                    --set extraArgs.initial-node-group-backoff-duration=1m \
                    --set extraArgs.max-node-group-backoff-duration=5m \
                    --atomic --timeout 5m

                # --- Block 4: EXTERNAL DNS (before ALB to avoid mutating webhook race) ---
                - |
                  [ "${TEARDOWN:-false}" = "true" ] && exit 0
                  echo "=== [4/5] EXTERNAL DNS ==="
                  helm repo add external-dns https://kubernetes-sigs.github.io/external-dns/
                  helm repo update
                  helm upgrade --install external-dns external-dns/external-dns \
                    --version $EXTERNAL_DNS_VERSION \
                    -n $NAMESPACE --create-namespace \
                    --set policy=sync \
                    --set registry=txt \
                    --set txtOwnerId=$CLUSTER_NAME \
                    --set "extraArgs[0]=--zone-id-filter=$HOSTED_ZONE_ID" \
                    --set serviceAccount.create=true \
                    --set serviceAccount.name=external-dns \
                    --set "serviceAccount.annotations.eks\.amazonaws\.com/role-arn=$EXTERNALDNS_ROLE_ARN" \
                    --atomic --timeout 3m

                # --- Block 5: ALB CONTROLLER + WEBHOOK PROBE ---
                - |
                  [ "${TEARDOWN:-false}" = "true" ] && exit 0
                  echo "=== [5/5] ALB CONTROLLER ==="
                  helm repo add eks https://aws.github.io/eks-charts
                  helm repo update
                  helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
                    --version $ALB_CONTROLLER_VERSION \
                    -n $NAMESPACE --create-namespace \
                    --set clusterName=$CLUSTER_NAME \
                    --set region=$REGION \
                    --set serviceAccount.create=true \
                    --set serviceAccount.name=aws-load-balancer-controller \
                    --set "serviceAccount.annotations.eks\.amazonaws\.com/role-arn=$ALB_ROLE_ARN" \
                    --set vpcId=$VPC_ID \
                    --set replicaCount=1 \
                    --atomic --timeout 5m
                  kubectl rollout status deployment/aws-load-balancer-controller -n $NAMESPACE --timeout=120s
                  cat > /tmp/alb-probe.yaml << 'PROBE'
                  apiVersion: networking.k8s.io/v1
                  kind: Ingress
                  metadata:
                    name: alb-webhook-probe
                    namespace: default
                    annotations:
                      alb.ingress.kubernetes.io/scheme: internal
                  spec:
                    ingressClassName: alb
                    rules:
                      - http:
                          paths:
                            - path: /
                              pathType: Prefix
                              backend:
                                service:
                                  name: probe
                                  port:
                                    number: 80
                  PROBE
                  echo "Waiting for ALB webhook to become ready..."
                  for i in $(seq 1 30); do
                    if kubectl create -f /tmp/alb-probe.yaml --dry-run=server 2>/dev/null; then
                      echo "  ALB webhook ready."
                      break
                    fi
                    echo "  Webhook not ready, retrying... ($((i * 5))s elapsed)"
                    sleep 5
                  done
            post_build:
              commands:
                - |
                  if [ "$CODEBUILD_BUILD_SUCCEEDING" = "1" ]; then
                    STATUS="SUCCESS"
                    REASON="Infra controllers deployed successfully"
                  else
                    STATUS="FAILED"
                    REASON="Infra deployment failed. Check CodeBuild logs: $CODEBUILD_BUILD_ID"
                  fi
                  PHYSICAL_ID="${CLUSTER_NAME}-helm-deployer"
                  curl -s -X PUT -H "Content-Type: " \
                    -d "{\"Status\":\"$STATUS\",\"Reason\":\"$REASON\",\"PhysicalResourceId\":\"$PHYSICAL_ID\",\"StackId\":\"$CFN_STACK_ID\",\"RequestId\":\"$CFN_REQUEST_ID\",\"LogicalResourceId\":\"$CFN_LOGICAL_ID\",\"Data\":{}}" \
                    "$CFN_RESPONSE_URL"

  PlatformaDeployerProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub '${ClusterName}-platforma-deployer'
      ServiceRole: !GetAtt HelmDeployerRole.Arn
      TimeoutInMinutes: 30
      Artifacts:
        Type: NO_ARTIFACTS
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
        EnvironmentVariables:
          - Name: CLUSTER_NAME
            Value: !Ref ClusterName
          - Name: REGION
            Value: !Ref AWS::Region
          - Name: NAMESPACE
            Value: !Ref PlatformaNamespace
          - Name: KUBERNETES_VERSION
            Value: !FindInMap [Constants, EKS, Version]
          # NOTE: Secrets below are visible in CodeBuild console/API.
          # The auto-generated users password uses SSM SecureString (see buildspec).
          # For user-provided secrets, restrict codebuild:BatchGetBuilds/BatchGetProjects
          # IAM permissions to trusted roles only.
          - Name: LICENSE_KEY
            Value: !Ref LicenseKey
            Type: PLAINTEXT
          - Name: PLATFORMA_VERSION
            Value: !If
              - UseDefaultPlatformaVersion
              - !FindInMap [Constants, Platforma, Version]
              - !Ref PlatformaVersion
          - Name: PLATFORMA_IMAGE
            Value: !Ref PlatformaImage
          - Name: DEPLOY_PLATFORMA
            Value: !Ref DeployPlatforma
          - Name: DOMAIN_NAME
            Value: !Ref DomainName
          - Name: CERTIFICATE_ARN
            Value: !Ref Certificate
          - Name: EFS_FILE_SYSTEM_ID
            Value: !Ref EfsFileSystem
          - Name: S3_BUCKET
            Value: !Ref S3Bucket
          - Name: PLATFORMA_ROLE_ARN
            Value: !GetAtt PlatformaIrsaRole.Arn
          - Name: PLATFORMA_JOBS_ROLE_ARN
            Value: !GetAtt PlatformaJobsIrsaRole.Arn
          - Name: VPC_ID
            Value: !If [CreateNewVpc, !Ref Vpc, !Ref VpcId]
          - Name: DEPLOYMENT_SIZE
            Value: !Ref DeploymentSize
          - Name: UI_QUEUE_CPU
            Value: !FindInMap [DeploymentSize, !Ref DeploymentSize, UiCpu]
          - Name: UI_QUEUE_MEMORY_GI
            Value: !FindInMap [DeploymentSize, !Ref DeploymentSize, UiMemoryGi]
          - Name: BATCH_QUEUE_CPU
            Value: !FindInMap [DeploymentSize, !Ref DeploymentSize, BatchCpu]
          - Name: BATCH_QUEUE_MEMORY_GI
            Value: !FindInMap [DeploymentSize, !Ref DeploymentSize, BatchMemoryGi]
          - Name: AUTH_METHOD
            Value: !Ref AuthMethod
          - Name: HTPASSWD_CONTENT
            Value: !Ref HtpasswdContent
          - Name: LDAP_SERVER
            Value: !Ref LdapServer
          - Name: LDAP_START_TLS
            Value: !Ref LdapStartTLS
          - Name: LDAP_BIND_DN
            Value: !Ref LdapBindDN
          - Name: LDAP_SEARCH_RULES
            Value: !Ref LdapSearchRules
          - Name: LDAP_SEARCH_USER
            Value: !Ref LdapSearchUser
          - Name: LDAP_SEARCH_PASSWORD
            Value: !Ref LdapSearchPassword
          - Name: ENABLE_DEMO_LIBRARY
            Value: !Ref EnableDemoLibrary
          - Name: DATA_LIBRARY_1_NAME
            Value: !Ref DataLibrary1Name
          - Name: DATA_LIBRARY_1_BUCKET
            Value: !Ref DataLibrary1Bucket
          - Name: DATA_LIBRARY_1_REGION
            Value: !Ref DataLibrary1Region
          - Name: DATA_LIBRARY_1_ACCESS_KEY
            Value: !Ref DataLibrary1AccessKey
          - Name: DATA_LIBRARY_1_SECRET_KEY
            Value: !Ref DataLibrary1SecretKey
          - Name: DATA_LIBRARY_2_NAME
            Value: !Ref DataLibrary2Name
          - Name: DATA_LIBRARY_2_BUCKET
            Value: !Ref DataLibrary2Bucket
          - Name: DATA_LIBRARY_2_REGION
            Value: !Ref DataLibrary2Region
          - Name: DATA_LIBRARY_2_ACCESS_KEY
            Value: !Ref DataLibrary2AccessKey
          - Name: DATA_LIBRARY_2_SECRET_KEY
            Value: !Ref DataLibrary2SecretKey
          - Name: DATA_LIBRARY_3_NAME
            Value: !Ref DataLibrary3Name
          - Name: DATA_LIBRARY_3_BUCKET
            Value: !Ref DataLibrary3Bucket
          - Name: DATA_LIBRARY_3_REGION
            Value: !Ref DataLibrary3Region
          - Name: DATA_LIBRARY_3_ACCESS_KEY
            Value: !Ref DataLibrary3AccessKey
          - Name: DATA_LIBRARY_3_SECRET_KEY
            Value: !Ref DataLibrary3SecretKey
          - Name: MIGRATION_DATABASE_S3_URI
            Value: !Ref MigrationDatabaseS3Uri
          - Name: MIGRATION_SOURCE_BUCKET
            Value: !Ref MigrationSourceBucket
          - Name: MIGRATION_SOURCE_PREFIX
            Value: !Ref MigrationSourcePrefix
          - Name: MIGRATION_SOURCE_REGION
            Value: !Ref MigrationSourceRegion
          - Name: MIGRATION_DB_ACCESS_KEY
            Value: !Ref MigrationDbAccessKey
          - Name: MIGRATION_DB_SECRET_KEY
            Value: !Ref MigrationDbSecretKey
          - Name: MIGRATION_STORAGE_ACCESS_KEY
            Value: !Ref MigrationStorageAccessKey
          - Name: MIGRATION_STORAGE_SECRET_KEY
            Value: !Ref MigrationStorageSecretKey
      Tags:
        - Key: platforma
          Value: !Ref ClusterName
      Source:
        Type: NO_SOURCE
        BuildSpec: |
          version: 0.2
          phases:
            install:
              commands:
                # Install kubectl
                - curl -sLO "https://dl.k8s.io/release/v${KUBERNETES_VERSION}.0/bin/linux/amd64/kubectl"
                - chmod +x kubectl && mv kubectl /usr/local/bin/
                # Install Helm
                - curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
                # Configure kubeconfig
                - aws eks update-kubeconfig --name $CLUSTER_NAME --region $REGION
            build:
              commands:
                # Block 0 = teardown; block 1 = deploy Platforma.
                # CodeBuild stops automatically on the first block that fails.

                # --- Block 0: PLATFORMA TEARDOWN (exits 0 immediately when TEARDOWN=false) ---
                - |
                  [ "${TEARDOWN:-false}" != "true" ] && exit 0
                  echo "=== PLATFORMA TEARDOWN ==="
                  helm uninstall platforma -n $NAMESPACE --ignore-not-found --wait --timeout 8m || true
                  echo "Waiting for ALBs (elbv2.k8s.aws/cluster=$CLUSTER_NAME) to be deleted..."
                  for i in $(seq 1 60); do
                    COUNT=$(aws resourcegroupstaggingapi get-resources \
                      --tag-filters "Key=elbv2.k8s.aws/cluster,Values=$CLUSTER_NAME" \
                      --resource-type-filters "elasticloadbalancing:loadbalancer" \
                      --query 'length(ResourceTagMappingList)' --output text --region $REGION 2>/dev/null || echo "0")
                    [ "$COUNT" = "0" ] && echo "  All ALBs deleted." && break
                    echo "  $COUNT ALB(s) still present, waiting... ($((i * 5))s elapsed)"
                    sleep 5
                  done
                  if [ "${COUNT:-0}" != "0" ]; then
                    echo "WARNING: $COUNT ALB(s) still present after 5 minutes. Attempting direct deletion..."
                    for ALB_ARN in $(aws resourcegroupstaggingapi get-resources \
                      --tag-filters "Key=elbv2.k8s.aws/cluster,Values=$CLUSTER_NAME" \
                      --resource-type-filters "elasticloadbalancing:loadbalancer" \
                      --query 'ResourceTagMappingList[].ResourceARN' --output text --region $REGION 2>/dev/null); do
                      echo "  Deleting ALB: $ALB_ARN"
                      aws elbv2 delete-load-balancer --load-balancer-arn "$ALB_ARN" --region $REGION || true
                    done
                    echo "  Waiting for force-deleted ALBs to vanish..."
                    for j in $(seq 1 24); do
                      REMAINING=$(aws resourcegroupstaggingapi get-resources \
                        --tag-filters "Key=elbv2.k8s.aws/cluster,Values=$CLUSTER_NAME" \
                        --resource-type-filters "elasticloadbalancing:loadbalancer" \
                        --query 'length(ResourceTagMappingList)' --output text --region $REGION 2>/dev/null || echo "0")
                      [ "$REMAINING" = "0" ] && echo "  All ALBs gone." && break
                      sleep 5
                    done
                  fi
                  sleep 10
                  echo "Cleaning up ALB target groups..."
                  for TG_ARN in $(aws resourcegroupstaggingapi get-resources \
                    --tag-filters "Key=elbv2.k8s.aws/cluster,Values=$CLUSTER_NAME" \
                    --resource-type-filters "elasticloadbalancing:targetgroup" \
                    --query 'ResourceTagMappingList[].ResourceARN' --output text --region $REGION 2>/dev/null); do
                    echo "  Deleting target group: $TG_ARN"
                    for t in $(seq 1 6); do
                      aws elbv2 delete-target-group --target-group-arn "$TG_ARN" --region $REGION 2>/dev/null && break
                      sleep 5
                    done
                  done
                  echo "Cleaning up ALB security groups..."
                  if [ -n "$VPC_ID" ] && [ "$VPC_ID" != "None" ]; then
                    ALB_SGS=$(aws ec2 describe-security-groups --region $REGION \
                      --filters "Name=vpc-id,Values=$VPC_ID" "Name=tag:elbv2.k8s.aws/cluster,Values=$CLUSTER_NAME" \
                      --query 'SecurityGroups[].GroupId' --output text 2>/dev/null || echo "")
                    for SG_ID in $ALB_SGS; do
                      echo "  Cleaning up SG $SG_ID..."
                      for RULE_ID in $(aws ec2 describe-security-group-rules --region $REGION \
                        --filters "Name=group-id,Values=$SG_ID" \
                        --query "SecurityGroupRules[?ReferencedGroupInfo].SecurityGroupRuleId" \
                        --output text 2>/dev/null); do
                        aws ec2 revoke-security-group-ingress --region $REGION \
                          --group-id "$SG_ID" --security-group-rule-ids "$RULE_ID" 2>/dev/null || \
                        aws ec2 revoke-security-group-egress --region $REGION \
                          --group-id "$SG_ID" --security-group-rule-ids "$RULE_ID" 2>/dev/null || true
                      done
                      for OTHER_SG in $(aws ec2 describe-security-groups --region $REGION \
                        --filters "Name=vpc-id,Values=$VPC_ID" "Name=ip-permission.group-id,Values=$SG_ID" \
                        --query 'SecurityGroups[].GroupId' --output text 2>/dev/null); do
                        for RULE_ID in $(aws ec2 describe-security-group-rules --region $REGION \
                          --filters "Name=group-id,Values=$OTHER_SG" \
                          --query "SecurityGroupRules[?ReferencedGroupInfo.GroupId=='$SG_ID'].SecurityGroupRuleId" \
                          --output text 2>/dev/null); do
                          aws ec2 revoke-security-group-ingress --region $REGION \
                            --group-id "$OTHER_SG" --security-group-rule-ids "$RULE_ID" 2>/dev/null || \
                          aws ec2 revoke-security-group-egress --region $REGION \
                            --group-id "$OTHER_SG" --security-group-rule-ids "$RULE_ID" 2>/dev/null || true
                        done
                      done
                      for k in $(seq 1 6); do
                        aws ec2 delete-security-group --group-id "$SG_ID" --region $REGION 2>/dev/null && echo "  Deleted $SG_ID" && break
                        echo "  SG $SG_ID still has dependencies, retrying... ($((k * 5))s)"
                        sleep 5
                      done
                    done
                  fi
                  # Clean up SSM parameter (created by install script, not CF)
                  aws ssm delete-parameter \
                    --name "/${CLUSTER_NAME}/platforma/users-password" \
                    --region $REGION 2>/dev/null || true
                  echo "Platforma teardown complete."
                  exit 0

                # --- Block 1: vCPU QUOTA CHECK + DEPLOY PLATFORMA ---
                - |
                  [ "${TEARDOWN:-false}" = "true" ] && exit 0
                  [ "$DEPLOY_PLATFORMA" != "true" ] && exit 0
                  echo "=== [1/1] PLATFORMA ==="
                  echo "Checking AWS On-Demand Standard vCPU quota..."
                  VCPU_QUOTA=$(aws service-quotas get-service-quota \
                    --service-code ec2 \
                    --quota-code L-1216C47A \
                    --region $REGION \
                    --query 'Quota.Value' --output text 2>/dev/null)
                  if [ -z "$VCPU_QUOTA" ]; then
                    echo "WARNING: Could not retrieve vCPU quota (check servicequotas:GetServiceQuota permission). Skipping check."
                  else
                    VCPU_QUOTA_INT=${VCPU_QUOTA%.*}
                    VCPU_NEEDED=$((BATCH_QUEUE_CPU + UI_QUEUE_CPU))
                    if [ "$VCPU_QUOTA_INT" -lt "$VCPU_NEEDED" ]; then
                      echo "ERROR: vCPU quota ($VCPU_QUOTA_INT) < needed ($VCPU_NEEDED: batch=$BATCH_QUEUE_CPU + ui=$UI_QUEUE_CPU)."
                      echo "  Request increase: https://console.aws.amazon.com/servicequotas/home/services/ec2/quotas/L-1216C47A"
                      exit 1
                    fi
                    echo "vCPU quota OK: $VCPU_QUOTA_INT available, $VCPU_NEEDED needed."
                  fi
                  kubectl create namespace $NAMESPACE --dry-run=client -o yaml | kubectl apply -f -
                  kubectl create secret generic platforma-license \
                    -n $NAMESPACE \
                    --from-literal=MI_LICENSE="$LICENSE_KEY" \
                    --dry-run=client -o yaml | kubectl apply -f -

                  if [ "$AUTH_METHOD" = "htpasswd" ]; then
                    if [ -z "$HTPASSWD_CONTENT" ]; then
                      EXISTING=$(aws ssm get-parameter \
                        --name "/${CLUSTER_NAME}/platforma/users-password" \
                        --with-decryption --query Parameter.Value --output text \
                        --region $REGION 2>/dev/null) || true
                      if [ -n "$EXISTING" ]; then
                        echo "Using existing users password from SSM: /${CLUSTER_NAME}/platforma/users-password"
                        USERS_PASSWORD="$EXISTING"
                      else
                        echo "No HtpasswdContent provided — generating random users password"
                        USERS_PASSWORD=$(openssl rand -base64 12)
                        aws ssm put-parameter \
                          --name "/${CLUSTER_NAME}/platforma/users-password" \
                          --type SecureString \
                          --value "$USERS_PASSWORD" \
                          --region $REGION
                        echo "Users password stored in SSM: /${CLUSTER_NAME}/platforma/users-password"
                      fi
                      HTPASSWD_CONTENT="platforma:$(openssl passwd -apr1 "$USERS_PASSWORD")"
                    fi
                    kubectl create secret generic platforma-htpasswd \
                      -n $NAMESPACE \
                      --from-literal=htpasswd="$HTPASSWD_CONTENT" \
                      --dry-run=client -o yaml | kubectl apply -f -
                  fi
                  # Build dataSources for configured data libraries
                  DATASOURCES_YAML=""
                  for LIB_NUM in 1 2 3; do
                    eval "LIB_NAME=\${DATA_LIBRARY_${LIB_NUM}_NAME:-}"
                    eval "LIB_BUCKET=\${DATA_LIBRARY_${LIB_NUM}_BUCKET:-}"
                    eval "LIB_REGION=\${DATA_LIBRARY_${LIB_NUM}_REGION:-$REGION}"
                    eval "LIB_KEY=\${DATA_LIBRARY_${LIB_NUM}_ACCESS_KEY:-}"
                    eval "LIB_SECRET=\${DATA_LIBRARY_${LIB_NUM}_SECRET_KEY:-}"
                    [ -z "$LIB_BUCKET" ] && continue
                    if [ -n "$LIB_KEY" ] && [ -z "$LIB_SECRET" ]; then
                      echo "ERROR: DataLibrary${LIB_NUM}AccessKey is set but DataLibrary${LIB_NUM}SecretKey is empty."
                      exit 1
                    fi
                    if [ -z "$LIB_KEY" ] && [ -n "$LIB_SECRET" ]; then
                      echo "ERROR: DataLibrary${LIB_NUM}SecretKey is set but DataLibrary${LIB_NUM}AccessKey is empty."
                      exit 1
                    fi
                    [ -z "$LIB_NAME" ] && LIB_NAME="library-${LIB_NUM}"
                    if [ -n "$LIB_KEY" ]; then
                      kubectl create secret generic "platforma-library-${LIB_NUM}-creds" \
                        -n $NAMESPACE \
                        --from-literal=access-key="$LIB_KEY" \
                        --from-literal=secret-key="$LIB_SECRET" \
                        --dry-run=client -o yaml | kubectl apply -f -
                      DATASOURCES_YAML="${DATASOURCES_YAML}
                  - name: ${LIB_NAME}
                    type: s3
                    s3:
                      bucket: ${LIB_BUCKET}
                      region: ${LIB_REGION}
                      secretRef:
                        name: platforma-library-${LIB_NUM}-creds"
                    else
                      DATASOURCES_YAML="${DATASOURCES_YAML}
                  - name: ${LIB_NAME}
                    type: s3
                    s3:
                      bucket: ${LIB_BUCKET}
                      region: ${LIB_REGION}"
                    fi
                  done

                  # Add MiLaboratories' demo data library if enabled
                  if [ "$ENABLE_DEMO_LIBRARY" = "true" ]; then
                    kubectl create secret generic "platforma-library-demo-creds" \
                      -n $NAMESPACE \
                      --from-literal=access-key="AKIAXOL6R5EBCOHXV7PC" \
                      --from-literal=secret-key="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" \
                      --dry-run=client -o yaml | kubectl apply -f -
                    DATASOURCES_YAML="${DATASOURCES_YAML}
                  - name: milabs-demo-data
                    type: s3
                    s3:
                      bucket: milab-euce1-prod-eks-s3-farm-library
                      region: eu-central-1
                      secretRef:
                        name: platforma-library-demo-creds"
                  fi

                  cat > /tmp/platforma-values.yaml << PLATFORMA_VALUES
                  environment: aws
                  storage:
                    database:
                      size: 50Gi
                      storageClass: gp3
                    workspace:
                      efs:
                        enabled: true
                        fileSystemId: $EFS_FILE_SYSTEM_ID
                    main:
                      type: s3
                      s3:
                        bucket: $S3_BUCKET
                        region: $REGION
                  serviceAccount:
                    create: true
                    annotations:
                      eks.amazonaws.com/role-arn: $PLATFORMA_ROLE_ARN
                  jobServiceAccount:
                    create: true
                    annotations:
                      eks.amazonaws.com/role-arn: $PLATFORMA_JOBS_ROLE_ARN
                  ingress:
                    enabled: true
                    className: alb
                    host: $DOMAIN_NAME
                    tls:
                      enabled: true
                    annotations:
                      alb.ingress.kubernetes.io/scheme: internet-facing
                      alb.ingress.kubernetes.io/target-type: ip
                      alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
                      alb.ingress.kubernetes.io/certificate-arn: $CERTIFICATE_ARN
                      alb.ingress.kubernetes.io/backend-protocol-version: GRPC
                  kueue:
                    maxJobResources:
                      cpu: 62
                      memory: 500Gi
                    mode: dedicated
                    pools:
                      ui:
                        nodeSelector:
                          node.kubernetes.io/pool: ui
                        tolerations:
                          - key: dedicated
                            value: ui
                            effect: NoSchedule
                      batch:
                        nodeSelector:
                          node.kubernetes.io/pool: batch
                        tolerations:
                          - key: dedicated
                            value: batch
                            effect: NoSchedule
                    dedicated:
                      resources:
                        ui:
                          cpu: $UI_QUEUE_CPU
                          memory: ${UI_QUEUE_MEMORY_GI}Gi
                        batch:
                          cpu: $BATCH_QUEUE_CPU
                          memory: ${BATCH_QUEUE_MEMORY_GI}Gi
                  app:
                    resources:
                      requests:
                        cpu: 4
                        memory: 16Gi
                      limits:
                        cpu: 8
                        memory: 16Gi
                    nodeSelector:
                      node.kubernetes.io/pool: system
                  dataSources: ${DATASOURCES_YAML:-[]}
                  PLATFORMA_VALUES

                  if [ "$AUTH_METHOD" = "htpasswd" ]; then
                    cat >> /tmp/platforma-values.yaml << AUTH_VALUES
                  auth:
                    htpasswd:
                      secretName: platforma-htpasswd
                  AUTH_VALUES
                  elif [ "$AUTH_METHOD" = "ldap" ]; then
                    # Write LDAP values directly into YAML to avoid Helm --set
                    # comma-splitting issues (LDAP DNs always contain commas).
                    cat >> /tmp/platforma-values.yaml << LDAP_BLOCK
                  auth:
                    ldap:
                      server: "${LDAP_SERVER}"
                      startTLS: ${LDAP_START_TLS}
                  LDAP_BLOCK
                    if [ -n "$LDAP_BIND_DN" ]; then
                      cat >> /tmp/platforma-values.yaml << LDAP_BIND
                      bindDN: "${LDAP_BIND_DN}"
                  LDAP_BIND
                    fi
                    if [ -n "$LDAP_SEARCH_USER" ]; then
                      cat >> /tmp/platforma-values.yaml << LDAP_SEARCH
                      searchUser: "${LDAP_SEARCH_USER}"
                      searchPassword: "${LDAP_SEARCH_PASSWORD}"
                  LDAP_SEARCH
                    fi
                    if [ -n "$LDAP_SEARCH_RULES" ]; then
                      echo "    searchRules:" >> /tmp/platforma-values.yaml
                      OLD_IFS="$IFS"
                      IFS=";"
                      for rule in $LDAP_SEARCH_RULES; do
                        IFS="$OLD_IFS"
                        rule=$(echo "$rule" | xargs)
                        [ -z "$rule" ] && { IFS=";"; continue; }
                        echo "      - \"${rule}\"" >> /tmp/platforma-values.yaml
                        IFS=";"
                      done
                      IFS="$OLD_IFS"
                    fi
                  fi

                  # --- Migration values ---
                  if [ -n "$MIGRATION_DATABASE_S3_URI" ]; then
                    # Create database dump credentials secret
                    if [ -n "$MIGRATION_DB_ACCESS_KEY" ]; then
                      kubectl create secret generic platforma-migration-db-creds \
                        -n $NAMESPACE \
                        --from-literal=aws-access-key-id="$MIGRATION_DB_ACCESS_KEY" \
                        --from-literal=aws-secret-access-key="$MIGRATION_DB_SECRET_KEY" \
                        --dry-run=client -o yaml | kubectl apply -f -
                    fi
                    cat >> /tmp/platforma-values.yaml << MIGRATION_BLOCK
                  dataMigration:
                    enabled: true
                    database:
                      s3Uri: "${MIGRATION_DATABASE_S3_URI}"
                  MIGRATION_BLOCK
                    if [ -n "$MIGRATION_DB_ACCESS_KEY" ]; then
                      cat >> /tmp/platforma-values.yaml << MIGRATION_DB_CREDS
                      credentialsSecret: platforma-migration-db-creds
                  MIGRATION_DB_CREDS
                    fi
                    if [ -n "$MIGRATION_SOURCE_BUCKET" ]; then
                      # Create storage credentials secret
                      if [ -n "$MIGRATION_STORAGE_ACCESS_KEY" ]; then
                        kubectl create secret generic platforma-migration-storage-creds \
                          -n $NAMESPACE \
                          --from-literal=aws-access-key-id="$MIGRATION_STORAGE_ACCESS_KEY" \
                          --from-literal=aws-secret-access-key="$MIGRATION_STORAGE_SECRET_KEY" \
                          --dry-run=client -o yaml | kubectl apply -f -
                      fi
                      cat >> /tmp/platforma-values.yaml << MIGRATION_SYNC
                    storageSync:
                      enabled: true
                      sourceBucket: "${MIGRATION_SOURCE_BUCKET}"
                      sourcePrefix: "${MIGRATION_SOURCE_PREFIX}"
                      sourceRegion: "${MIGRATION_SOURCE_REGION}"
                  MIGRATION_SYNC
                      if [ -n "$MIGRATION_STORAGE_ACCESS_KEY" ]; then
                        cat >> /tmp/platforma-values.yaml << MIGRATION_STORAGE_CREDS
                      credentialsSecret: platforma-migration-storage-creds
                  MIGRATION_STORAGE_CREDS
                      fi
                    fi
                  fi

                  if [ -n "$PLATFORMA_IMAGE" ]; then
                    IMG_REPO=$(echo "$PLATFORMA_IMAGE" | sed 's/:.*//')
                    IMG_TAG=$(echo "$PLATFORMA_IMAGE" | sed 's/.*://')
                    cat >> /tmp/platforma-values.yaml << IMAGE_BLOCK
                  image:
                    repository: "${IMG_REPO}"
                    tag: "${IMG_TAG}"
                  IMAGE_BLOCK
                  fi

                  # Increase timeout when migration is active (S3 sync can take hours)
                  HELM_TIMEOUT="15m"
                  if [ -n "$MIGRATION_DATABASE_S3_URI" ]; then
                    HELM_TIMEOUT="120m"
                  fi

                  helm upgrade --install platforma oci://ghcr.io/milaboratory/platforma-helm/platforma \
                    --version $PLATFORMA_VERSION \
                    -n $NAMESPACE \
                    -f /tmp/platforma-values.yaml \
                    --atomic --timeout $HELM_TIMEOUT
            post_build:
              commands:
                - |
                  if [ "$CODEBUILD_BUILD_SUCCEEDING" = "1" ]; then
                    STATUS="SUCCESS"
                    REASON="Platforma deployment completed successfully"
                  else
                    STATUS="FAILED"
                    REASON="Platforma deployment failed. Check CodeBuild logs: $CODEBUILD_BUILD_ID"
                  fi
                  PHYSICAL_ID="${CLUSTER_NAME}-platforma-deployer"
                  curl -s -X PUT -H "Content-Type: " \
                    -d "{\"Status\":\"$STATUS\",\"Reason\":\"$REASON\",\"PhysicalResourceId\":\"$PHYSICAL_ID\",\"StackId\":\"$CFN_STACK_ID\",\"RequestId\":\"$CFN_REQUEST_ID\",\"LogicalResourceId\":\"$CFN_LOGICAL_ID\",\"Data\":{}}" \
                    "$CFN_RESPONSE_URL"

  TriggerHelmDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ClusterName}-${AWS::Region}-helm-trigger'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: StartCodeBuild
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - codebuild:StartBuild
                Resource:
                  - !Sub 'arn:aws:codebuild:${AWS::Region}:${AWS::AccountId}:project/${ClusterName}-helm-deployer'
                  - !Sub 'arn:aws:codebuild:${AWS::Region}:${AWS::AccountId}:project/${ClusterName}-platforma-deployer'
      Tags:
        - Key: platforma
          Value: !Ref ClusterName

  TriggerHelmDeployFunction:
    Type: AWS::Lambda::Function
    DependsOn:
      - HelmDeployerProject
      - PlatformaDeployerProject
    Properties:
      FunctionName: !Sub '${ClusterName}-helm-trigger'
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt TriggerHelmDeployRole.Arn
      Timeout: 30
      Tags:
        - Key: platforma
          Value: !Ref ClusterName
      Environment:
        Variables:
          CODEBUILD_PROJECT: !Sub '${ClusterName}-helm-deployer'
      Code:
        ZipFile: |
          import boto3, json, os, urllib.request
          def handler(event, context):
            # Read project name from custom resource properties (allows one Lambda
            # to serve both infra and platforma triggers). Falls back to env var.
            props = event.get('ResourceProperties', {})
            project = props.get('CodeBuildProject', os.environ['CODEBUILD_PROJECT'])
            # Stable physical resource ID prevents CF cleanup deletes from
            # triggering teardown on every update.
            stable_id = project
            extra = []
            if event['RequestType'] == 'Delete':
              old_id = event.get('PhysicalResourceId', '')
              if old_id != stable_id:
                # CF is cleaning up an old physical resource (e.g., from a
                # previous update that used the build ID). Just acknowledge.
                print(f'Cleanup delete for old resource {old_id}, skipping teardown')
                send(event, 'SUCCESS', {}, stable_id)
                return
              extra = [{'name': 'TEARDOWN', 'value': 'true', 'type': 'PLAINTEXT'}]
            try:
              cb = boto3.client('codebuild')
              resp = cb.start_build(
                projectName=project,
                environmentVariablesOverride=[
                  {'name': 'CFN_RESPONSE_URL', 'value': event['ResponseURL'], 'type': 'PLAINTEXT'},
                  {'name': 'CFN_STACK_ID',     'value': event['StackId'],     'type': 'PLAINTEXT'},
                  {'name': 'CFN_REQUEST_ID',   'value': event['RequestId'],   'type': 'PLAINTEXT'},
                  {'name': 'CFN_LOGICAL_ID',   'value': event['LogicalResourceId'], 'type': 'PLAINTEXT'},
                ] + extra
              )
              print(f'Started CodeBuild build: {resp["build"]["id"]}')
            except Exception as e:
              print(f'Failed to start CodeBuild: {e}')
              send(event, 'FAILED', {'Error': str(e)}, stable_id)
          def send(event, status, data, physical_id=None):
            body = json.dumps({
              'Status': status,
              'Reason': 'See CloudWatch Logs',
              'PhysicalResourceId': physical_id or event.get('PhysicalResourceId', 'helm-deployer'),
              'StackId': event['StackId'],
              'RequestId': event['RequestId'],
              'LogicalResourceId': event['LogicalResourceId'],
              'Data': data
            })
            req = urllib.request.Request(
              event['ResponseURL'], data=body.encode(), method='PUT',
              headers={'Content-Type': ''}
            )
            urllib.request.urlopen(req)

  TriggerHelmDeploy:
    Type: AWS::CloudFormation::CustomResource
    DependsOn:
      - HelmDeployerAccessEntry
      - EbsCsiAddon
      - EfsCsiAddon
    Properties:
      ServiceToken: !GetAtt TriggerHelmDeployFunction.Arn
      CodeBuildProject: !Sub '${ClusterName}-helm-deployer'
      # Properties below trigger re-deployment when changed during stack update.
      # The Lambda reads CodeBuildProject; the rest exist only so CloudFormation
      # detects property changes and sends an UPDATE event.
      KubernetesVersion: !FindInMap [Constants, EKS, Version]
      ForceUpdateInfra: "1"  # Bump to force infra re-deployment

  TriggerPlatformaDeploy:
    Type: AWS::CloudFormation::CustomResource
    DependsOn:
      - TriggerHelmDeploy
      - EfsMountTarget1
      - EfsMountTarget2
      - EfsMountTarget3
      - S3Bucket
      - Certificate
    Properties:
      ServiceToken: !GetAtt TriggerHelmDeployFunction.Arn
      CodeBuildProject: !Sub '${ClusterName}-platforma-deployer'
      # Properties below trigger re-deployment when changed during stack update.
      ForceUpdatePlatforma: "1"  # Bump to force Platforma re-deployment
      PlatformaVersion: !If
        - UseDefaultPlatformaVersion
        - !FindInMap [Constants, Platforma, Version]
        - !Ref PlatformaVersion
      PlatformaImage: !Ref PlatformaImage
      DeployPlatforma: !Ref DeployPlatforma
      LicenseKey: !Ref LicenseKey
      AuthMethod: !Ref AuthMethod
      HtpasswdContent: !Ref HtpasswdContent
      LdapServer: !Ref LdapServer
      LdapStartTLS: !Ref LdapStartTLS
      LdapBindDN: !Ref LdapBindDN
      LdapSearchRules: !Ref LdapSearchRules
      LdapSearchUser: !Ref LdapSearchUser
      LdapSearchPassword: !Ref LdapSearchPassword
      DomainName: !Ref DomainName
      DeploymentSize: !Ref DeploymentSize
      DataLibrary1Name: !Ref DataLibrary1Name
      DataLibrary1Bucket: !Ref DataLibrary1Bucket
      DataLibrary1Region: !Ref DataLibrary1Region
      DataLibrary1AccessKey: !Ref DataLibrary1AccessKey
      DataLibrary1SecretKey: !Ref DataLibrary1SecretKey
      DataLibrary2Name: !Ref DataLibrary2Name
      DataLibrary2Bucket: !Ref DataLibrary2Bucket
      DataLibrary2Region: !Ref DataLibrary2Region
      DataLibrary2AccessKey: !Ref DataLibrary2AccessKey
      DataLibrary2SecretKey: !Ref DataLibrary2SecretKey
      DataLibrary3Name: !Ref DataLibrary3Name
      DataLibrary3Bucket: !Ref DataLibrary3Bucket
      DataLibrary3Region: !Ref DataLibrary3Region
      DataLibrary3AccessKey: !Ref DataLibrary3AccessKey
      DataLibrary3SecretKey: !Ref DataLibrary3SecretKey

  # ---------------------------------------------------------------------------
  # 6. Storage — EFS (shared workspace)
  # ---------------------------------------------------------------------------
  EfsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    DependsOn: EksCluster  # required to resolve EksCluster.ClusterSecurityGroupId
    Properties:
      GroupDescription: !Sub 'Allow NFS traffic to Platforma EFS - ${ClusterName}'
      VpcId: !If [CreateNewVpc, !Ref Vpc, !Ref VpcId]
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !GetAtt EksCluster.ClusterSecurityGroupId
      Tags:
        - Key: Name
          Value: !Sub '${ClusterName}-efs-sg'
        - Key: platforma
          Value: !Ref ClusterName

  EfsFileSystem:
    Type: AWS::EFS::FileSystem
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      PerformanceMode: generalPurpose
      ThroughputMode: elastic
      Encrypted: true
      FileSystemTags:
        - Key: Name
          Value: !Sub '${ClusterName}-workspace'
        - Key: platforma
          Value: !Ref ClusterName

  # Mount targets — one per AZ for HA access from all nodes
  EfsMountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EfsFileSystem
      SubnetId: !If [CreateNewVpc, !Ref PrivateSubnet1, !Select [0, !Ref PrivateSubnetIds]]
      SecurityGroups:
        - !Ref EfsSecurityGroup

  EfsMountTarget2:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EfsFileSystem
      SubnetId: !If [CreateNewVpc, !Ref PrivateSubnet2, !Select [1, !Ref PrivateSubnetIds]]
      SecurityGroups:
        - !Ref EfsSecurityGroup

  EfsMountTarget3:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EfsFileSystem
      SubnetId: !If [CreateNewVpc, !Ref PrivateSubnet3, !Select [2, !Ref PrivateSubnetIds]]
      SecurityGroups:
        - !Ref EfsSecurityGroup

  # ---------------------------------------------------------------------------
  # 7. Storage — S3 bucket (primary storage)
  # ---------------------------------------------------------------------------
  S3Bucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !If
        - AutoGenerateS3Name
        - !Join
          - '-'
          - - 'platforma'
            - !Ref ClusterName
            - !Select [0, !Split ['-', !Select [2, !Split ['/', !Ref 'AWS::StackId']]]]
        - !Ref S3BucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: platforma
          Value: !Ref ClusterName

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt S3Bucket.Arn
              - !Sub '${S3Bucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: 'false'
          # Access control relies on IAM: only the Platforma IRSA role has
          # s3:* permissions on this bucket via its inline policy. Removing
          # the previous deny-all-except-role pattern because it locked out
          # account administrators from cleanup after stack deletion
          # (the IRSA role is deleted with the stack, leaving no one with access).

  # ---------------------------------------------------------------------------
  # 8. ACM Certificate (DNS-validated via Route53)
  # ---------------------------------------------------------------------------
  Certificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref DomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZoneId
      Tags:
        - Key: Name
          Value: !Sub '${ClusterName}-certificate'
        - Key: platforma
          Value: !Ref ClusterName

# =============================================================================
# Outputs
# =============================================================================
Outputs:
  PlatformaUrl:
    Description: >
      Platforma URL. Connect to this address using the Platforma Desktop App.
    Value: !Sub 'https://${DomainName}'

  DefaultUsername:
    Condition: IsHtpasswd
    Description: >
      Default username for Platforma login (htpasswd mode, auto-generated password).
    Value: platforma

  UsersPasswordSSMPath:
    Condition: IsHtpasswd
    Description: >
      SSM Parameter containing auto-generated users password (htpasswd mode only).
      Retrieve with: aws ssm get-parameter --name /<ClusterName>/platforma/users-password --with-decryption --query Parameter.Value --output text
    Value: !Sub '/${ClusterName}/platforma/users-password'

  UsersPasswordSSMConsole:
    Condition: IsHtpasswd
    Description: >
      Click to open the SSM Parameter with the auto-generated users password.
      Click "Show" on the parameter page to reveal the value.
    Value: !Sub 'https://${AWS::Region}.console.aws.amazon.com/systems-manager/parameters/%2F${ClusterName}%2Fplatforma%2Fusers-password/description?region=${AWS::Region}'

  ClusterName:
    Description: >
      EKS cluster name. To access the cluster:
      aws eks update-kubeconfig --name <ClusterName> --region <Region>
    Value: !Ref EksCluster

  S3BucketOutput:
    Description: S3 bucket name for primary storage (retained on stack deletion)
    Value: !Ref S3Bucket

  Region:
    Description: AWS region where the cluster is deployed
    Value: !Ref AWS::Region

  HelmDeployerBuildProject:
    Description: >
      CodeBuild project that deploys infrastructure controllers (Kueue, AppWrapper,
      Cluster Autoscaler, ALB Controller, External DNS). Check logs here if the stack fails.
    Value: !Sub 'https://${AWS::Region}.console.aws.amazon.com/codesuite/codebuild/${AWS::AccountId}/projects/${ClusterName}-helm-deployer/history?region=${AWS::Region}'

  PlatformaDeployerBuildProject:
    Description: >
      CodeBuild project that deploys Platforma. Check logs here if Platforma deployment fails.
    Value: !Sub 'https://${AWS::Region}.console.aws.amazon.com/codesuite/codebuild/${AWS::AccountId}/projects/${ClusterName}-platforma-deployer/history?region=${AWS::Region}'

  PostDeploySteps:
    Description: What to do after the stack completes
    Value: >-
      Stack deploys everything automatically. Once complete, connect the Platforma
      Desktop App to your domain on port 443. If deployment fails, check the CodeBuild
      project logs (see HelmDeployerBuildProject and PlatformaDeployerBuildProject outputs).
