  Batch32c256gNodeGroupV2:
    Type: AWS::EKS::Nodegroup
    Properties:
      ClusterName: !Ref EksCluster
      NodegroupName: batch-32c-256g-v2
      Version: !FindInMap [Constants, EKS, Version]
      NodeRole: !GetAtt NodeGroupRole.Arn
