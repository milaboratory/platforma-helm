  # ---------------------------------------------------------------------------
  # 5. EKS addons — CSI drivers (DependsOn: SystemNodeGroup for running pods)
  # ---------------------------------------------------------------------------
  EbsCsiAddon:
    Type: AWS::EKS::Addon
    DependsOn: SystemNodeGroup
    Properties:
      ClusterName: !Ref EksCluster
      AddonName: aws-ebs-csi-driver
      ServiceAccountRoleArn: !GetAtt EbsCsiDriverRole.Arn
      ResolveConflicts: OVERWRITE

  EfsCsiAddon:
    Type: AWS::EKS::Addon
    DependsOn: SystemNodeGroup
    Properties:
      ClusterName: !Ref EksCluster
      AddonName: aws-efs-csi-driver
      ServiceAccountRoleArn: !GetAtt EfsCsiDriverRole.Arn
      ResolveConflicts: OVERWRITE

  # ---------------------------------------------------------------------------
  # 5b. Helm deployer — CodeBuild custom resource
  #     Deploys: Kueue, AppWrapper, Cluster Autoscaler, ALB Controller,
  #              External DNS, and Platforma via a single CodeBuild build.
  #     The Lambda starts the build and exits immediately; the CodeBuild
  #     post_build phase sends the CloudFormation response via curl.
  # ---------------------------------------------------------------------------

  HelmDeployerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ClusterName}-helm-deployer'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: HelmDeployerPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - eks:DescribeCluster
                Resource: !Sub 'arn:aws:eks:${AWS::Region}:${AWS::AccountId}:cluster/${ClusterName}'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/${ClusterName}-helm-deployer:*'

  HelmDeployerAccessEntry:
    Type: AWS::EKS::AccessEntry
    DependsOn: EksCluster
    Properties:
      ClusterName: !Ref EksCluster
      PrincipalArn: !GetAtt HelmDeployerRole.Arn
      Type: STANDARD
      AccessPolicies:
        - PolicyArn: arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy
          AccessScope:
            Type: cluster

  HelmDeployerProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub '${ClusterName}-helm-deployer'
      ServiceRole: !GetAtt HelmDeployerRole.Arn
      TimeoutInMinutes: 30
      Artifacts:
        Type: NO_ARTIFACTS
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
        EnvironmentVariables:
          - Name: CLUSTER_NAME
            Value: !Ref ClusterName
          - Name: REGION
            Value: !Ref AWS::Region
          - Name: NAMESPACE
            Value: !Ref PlatformaNamespace
          - Name: LICENSE_KEY
            Value: !Ref LicenseKey
            Type: PLAINTEXT
          - Name: DOMAIN_NAME
            Value: !Ref DomainName
          - Name: CERTIFICATE_ARN
            Value: !Ref Certificate
          - Name: AUTOSCALER_ROLE_ARN
            Value: !GetAtt AutoscalerIrsaRole.Arn
          - Name: VPC_ID
            Value: !Ref Vpc
          - Name: ALB_ROLE_ARN
            Value: !GetAtt ALBControllerRole.Arn
          - Name: EXTERNALDNS_ROLE_ARN
            Value: !GetAtt ExternalDNSRole.Arn
          - Name: PLATFORMA_ROLE_ARN
            Value: !GetAtt PlatformaIrsaRole.Arn
          - Name: EFS_FILE_SYSTEM_ID
            Value: !Ref EfsFileSystem
          - Name: S3_BUCKET
            Value: !Ref S3Bucket
          - Name: PLATFORMA_VERSION
            Value: !Ref PlatformaVersion
          - Name: DEPLOY_PLATFORMA
            Value: !Ref DeployPlatforma
          - Name: HOSTED_ZONE_ID
            Value: !Ref HostedZoneId
          - Name: KUBERNETES_VERSION
            Value: !Ref KubernetesVersion
          - Name: KUEUE_VERSION
            Value: !Ref KueueVersion
          - Name: APPWRAPPER_VERSION
            Value: !Ref AppWrapperVersion
          - Name: CLUSTER_AUTOSCALER_CHART_VERSION
            Value: !Ref ClusterAutoscalerChartVersion
          - Name: EXTERNAL_DNS_VERSION
            Value: !Ref ExternalDnsVersion
          - Name: ALB_CONTROLLER_VERSION
            Value: !Ref AlbControllerVersion
      Source:
        Type: NO_SOURCE
        BuildSpec: |
          version: 0.2
          phases:
            install:
              commands:
                # Install kubectl
                - curl -sLO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
                - chmod +x kubectl && mv kubectl /usr/local/bin/
                # Install Helm
                - curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
                # Configure kubeconfig
                - aws eks update-kubeconfig --name $CLUSTER_NAME --region $REGION
            build:
              commands:
                # 1. Kueue
                - |
                  helm upgrade --install kueue oci://registry.k8s.io/kueue/charts/kueue \
                    --version $KUEUE_VERSION \
                    -n kueue-system --create-namespace \
                    --set controllerManager.manager.resources.limits.cpu=500m \
                    --set controllerManager.manager.resources.limits.memory=512Mi \
                    --set controllerManager.manager.resources.requests.cpu=100m \
                    --set controllerManager.manager.resources.requests.memory=256Mi \
                    --set featureGates.AppWrapper=true \
                    --set 'integrations.frameworks[0]=batch/job' \
                    --set 'integrations.frameworks[1]=jobset.x-k8s.io/jobset' \
                    --set 'integrations.frameworks[2]=workload.codeflare.dev/appwrapper' \
                    --set 'integrations.podOptions.namespaceSelector.matchExpressions[0].key=kubernetes.io/metadata.name' \
                    --set 'integrations.podOptions.namespaceSelector.matchExpressions[0].operator=NotIn' \
                    --set 'integrations.podOptions.namespaceSelector.matchExpressions[0].values[0]=kube-system' \
                    --set 'integrations.podOptions.namespaceSelector.matchExpressions[0].values[1]=kueue-system' \
                    --set metrics.enableClusterQueueResources=true \
                    --wait --timeout 5m
                # 2. AppWrapper controller
                - kubectl apply --server-side -f https://github.com/project-codeflare/appwrapper/releases/download/$APPWRAPPER_VERSION/install.yaml
                - kubectl wait --for=condition=Available deployment/appwrapper-controller-manager -n appwrapper-system --timeout=120s
                # 2b. Delete AppWrapper webhooks — they inject IAM ARN as a label, which is
                #     invalid in Kubernetes (colons not allowed). Kueue handles admission instead.
                - kubectl delete validatingwebhookconfiguration appwrapper-validating-webhook-configuration --ignore-not-found
                - kubectl delete mutatingwebhookconfiguration appwrapper-mutating-webhook-configuration --ignore-not-found
                # 3. Cluster Autoscaler
                - helm repo add autoscaler https://kubernetes.github.io/autoscaler
                - helm repo update
                - |
                  helm upgrade --install cluster-autoscaler autoscaler/cluster-autoscaler \
                    --version $CLUSTER_AUTOSCALER_CHART_VERSION \
                    --set image.tag=v$KUBERNETES_VERSION.0 \
                    -n $NAMESPACE --create-namespace \
                    --set autoDiscovery.clusterName=$CLUSTER_NAME \
                    --set awsRegion=$REGION \
                    --set rbac.serviceAccount.create=true \
                    --set rbac.serviceAccount.name=cluster-autoscaler \
                    --set "rbac.serviceAccount.annotations.eks\.amazonaws\.com/role-arn=$AUTOSCALER_ROLE_ARN" \
                    --set 'autoDiscovery.tags[0]=k8s.io/cluster-autoscaler/enabled' \
                    --set "autoDiscovery.tags[1]=k8s.io/cluster-autoscaler/$CLUSTER_NAME" \
                    --set extraArgs.scale-down-delay-after-add=10m \
                    --set extraArgs.scale-down-unneeded-time=10m \
                    --set extraArgs.scale-down-utilization-threshold=0.5 \
                    --set extraArgs.expander=least-waste \
                    --wait --timeout 5m
                # 4. External DNS (installed before ALB Controller so its Service is created
                #    before the ALB mutating webhook is registered)
                - helm repo add external-dns https://kubernetes-sigs.github.io/external-dns/
                - helm repo update
                - |
                  helm upgrade --install external-dns external-dns/external-dns \
                    --version $EXTERNAL_DNS_VERSION \
                    -n $NAMESPACE --create-namespace \
                    --set policy=upsert-only \
                    --set registry=txt \
                    --set txtOwnerId=$CLUSTER_NAME \
                    --set "zoneIdFilters[0]=$HOSTED_ZONE_ID" \
                    --set serviceAccount.create=true \
                    --set serviceAccount.name=external-dns \
                    --set "serviceAccount.annotations.eks\.amazonaws\.com/role-arn=$EXTERNALDNS_ROLE_ARN"
                # 5. AWS Load Balancer Controller
                - helm repo add eks https://aws.github.io/eks-charts
                - helm repo update
                - |
                  helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
                    --version $ALB_CONTROLLER_VERSION \
                    -n $NAMESPACE --create-namespace \
                    --set clusterName=$CLUSTER_NAME \
                    --set region=$REGION \
                    --set serviceAccount.create=true \
                    --set serviceAccount.name=aws-load-balancer-controller \
                    --set "serviceAccount.annotations.eks\.amazonaws\.com/role-arn=$ALB_ROLE_ARN" \
                    --set vpcId=$VPC_ID \
                    --set replicaCount=1
                # 5b. Log ALB Controller pod status for diagnostics (non-fatal — pods may still be starting)
                - sleep 30
                - kubectl get pods -n $NAMESPACE -l app.kubernetes.io/name=aws-load-balancer-controller -o wide || true
                - kubectl describe pods -n $NAMESPACE -l app.kubernetes.io/name=aws-load-balancer-controller 2>&1 | tail -40 || true
                # 6. Platforma (optional — skipped when DEPLOY_PLATFORMA=false)
                - |
                  if [ "$DEPLOY_PLATFORMA" = "true" ]; then
                    kubectl create namespace $NAMESPACE --dry-run=client -o yaml | kubectl apply -f -
                    kubectl create secret generic platforma-license \
                      -n $NAMESPACE \
                      --from-literal=MI_LICENSE="$LICENSE_KEY" \
                      --dry-run=client -o yaml | kubectl apply -f -
                    cat > /tmp/platforma-values.yaml << PLATFORMA_VALUES
                  storage:
                    database:
                      size: 50Gi
                      storageClass: gp3
                    workspace:
                      pvc:
                        enabled: true
                        storageClass: efs-platforma
                        size: 100Gi
                    main:
                      type: s3
                      s3:
                        bucket: $S3_BUCKET
                        region: $REGION
                  storageClasses:
                    gp3:
                      create: true
                      name: gp3
                    efs:
                      create: true
                      name: efs-platforma
                      fileSystemId: $EFS_FILE_SYSTEM_ID
                      uid: "1010"
                      gid: "1010"
                  serviceAccount:
                    create: true
                    annotations:
                      eks.amazonaws.com/role-arn: $PLATFORMA_ROLE_ARN
                  ingress:
                    enabled: true
                    className: alb
                    api:
                      host: $DOMAIN_NAME
                      tls:
                        enabled: true
                      annotations:
                        alb.ingress.kubernetes.io/scheme: internet-facing
                        alb.ingress.kubernetes.io/target-type: ip
                        alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
                        alb.ingress.kubernetes.io/certificate-arn: $CERTIFICATE_ARN
                        alb.ingress.kubernetes.io/backend-protocol-version: GRPC
                  kueue:
                    mode: dedicated
                    dedicated:
                      pools:
                        ui:
                          resources:
                            cpu: 4
                            memory: 16Gi
                          nodeSelector:
                            node.kubernetes.io/pool: ui
                          tolerations:
                            - key: dedicated
                              value: ui
                              effect: NoSchedule
                        batch:
                          resources:
                            cpu: 60
                            memory: 240Gi
                          nodeSelector:
                            node.kubernetes.io/pool: batch
                          tolerations:
                            - key: dedicated
                              value: batch
                              effect: NoSchedule
                  nodeSelector:
                    node.kubernetes.io/pool: system
                  PLATFORMA_VALUES
                    helm upgrade --install platforma oci://ghcr.io/milaboratory/platforma-helm/platforma \
                      --version $PLATFORMA_VERSION \
                      -n $NAMESPACE \
                      -f /tmp/platforma-values.yaml \
                      --wait --timeout 10m
                  fi
            post_build:
              commands:
                - |
                  if [ "$CODEBUILD_BUILD_SUCCEEDING" = "1" ]; then
                    STATUS="SUCCESS"
                    REASON="Helm deployment completed successfully"
                  else
                    STATUS="FAILED"
                    REASON="Helm deployment failed. Check CodeBuild logs: $CODEBUILD_BUILD_ID"
                  fi
                - |
                  curl -s -X PUT -H "Content-Type: " \
                    -d "{\"Status\":\"$STATUS\",\"Reason\":\"$REASON\",\"PhysicalResourceId\":\"$CODEBUILD_BUILD_ID\",\"StackId\":\"$CFN_STACK_ID\",\"RequestId\":\"$CFN_REQUEST_ID\",\"LogicalResourceId\":\"$CFN_LOGICAL_ID\",\"Data\":{}}" \
                    "$CFN_RESPONSE_URL"

  TriggerHelmDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ClusterName}-helm-trigger'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: StartCodeBuild
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - codebuild:StartBuild
                Resource: !Sub 'arn:aws:codebuild:${AWS::Region}:${AWS::AccountId}:project/${ClusterName}-helm-deployer'

  TriggerHelmDeployFunction:
    Type: AWS::Lambda::Function
    DependsOn: HelmDeployerProject
    Properties:
      FunctionName: !Sub '${ClusterName}-helm-trigger'
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt TriggerHelmDeployRole.Arn
      Timeout: 30
      Environment:
        Variables:
          CODEBUILD_PROJECT: !Sub '${ClusterName}-helm-deployer'
      Code:
        ZipFile: |
          import boto3, json, os, urllib.request
          def handler(event, context):
            if event['RequestType'] == 'Delete':
              send(event, 'SUCCESS', {})
              return
            try:
              cb = boto3.client('codebuild')
              resp = cb.start_build(
                projectName=os.environ['CODEBUILD_PROJECT'],
                environmentVariablesOverride=[
                  {'name': 'CFN_RESPONSE_URL', 'value': event['ResponseURL'], 'type': 'PLAINTEXT'},
                  {'name': 'CFN_STACK_ID',     'value': event['StackId'],     'type': 'PLAINTEXT'},
                  {'name': 'CFN_REQUEST_ID',   'value': event['RequestId'],   'type': 'PLAINTEXT'},
                  {'name': 'CFN_LOGICAL_ID',   'value': event['LogicalResourceId'], 'type': 'PLAINTEXT'},
                ]
              )
              build_id = resp['build']['id']
              print(f'Started CodeBuild build: {build_id}')
              # Do NOT send CFN response here — CodeBuild post_build will send it.
            except Exception as e:
              print(f'Failed to start CodeBuild: {e}')
              send(event, 'FAILED', {'Error': str(e)})
          def send(event, status, data):
            body = json.dumps({
              'Status': status,
              'Reason': f'See CloudWatch Logs',
              'PhysicalResourceId': event.get('PhysicalResourceId', 'helm-deployer'),
              'StackId': event['StackId'],
              'RequestId': event['RequestId'],
              'LogicalResourceId': event['LogicalResourceId'],
              'Data': data
            })
            req = urllib.request.Request(
              event['ResponseURL'], data=body.encode(), method='PUT',
              headers={'Content-Type': ''}
            )
            urllib.request.urlopen(req)

  TriggerHelmDeploy:
    Type: AWS::CloudFormation::CustomResource
    DependsOn:
      - HelmDeployerAccessEntry
      - EbsCsiAddon
      - EfsCsiAddon
      - S3Bucket
      - Certificate
    Properties:
      ServiceToken: !GetAtt TriggerHelmDeployFunction.Arn

  # ---------------------------------------------------------------------------
  # 6. Storage — EFS (shared workspace)
  # ---------------------------------------------------------------------------
  EfsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    DependsOn: EksCluster  # required to resolve EksCluster.ClusterSecurityGroupId
    Properties:
      GroupDescription: !Sub 'Allow NFS traffic to Platforma EFS - ${ClusterName}'
      VpcId: !If [CreateNewVpc, !Ref Vpc, !Ref VpcId]
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !GetAtt EksCluster.ClusterSecurityGroupId
      Tags:
        - Key: Name
          Value: !Sub '${ClusterName}-efs-sg'

  EfsFileSystem:
    Type: AWS::EFS::FileSystem
    DeletionPolicy: Retain
    Properties:
      PerformanceMode: !Ref EfsPerformanceMode
      ThroughputMode: elastic
      Encrypted: true
      FileSystemTags:
        - Key: Name
          Value: !Sub '${ClusterName}-workspace'

  # Mount targets — one per AZ for HA access from all nodes
  EfsMountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EfsFileSystem
      SubnetId: !If [CreateNewVpc, !Ref PrivateSubnet1, !Select [0, !Ref PrivateSubnetIds]]
      SecurityGroups:
        - !Ref EfsSecurityGroup

  EfsMountTarget2:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EfsFileSystem
      SubnetId: !If [CreateNewVpc, !Ref PrivateSubnet2, !Select [1, !Ref PrivateSubnetIds]]
      SecurityGroups:
        - !Ref EfsSecurityGroup

  EfsMountTarget3:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EfsFileSystem
      SubnetId: !If [CreateNewVpc, !Ref PrivateSubnet3, !Select [2, !Ref PrivateSubnetIds]]
      SecurityGroups:
        - !Ref EfsSecurityGroup

  # ---------------------------------------------------------------------------
  # 7. Storage — S3 bucket (primary storage)
  # ---------------------------------------------------------------------------
  S3Bucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Delete
    Properties:
      BucketName: !If
        - AutoGenerateS3Name
        - !Sub 'platforma-storage-${AWS::AccountId}-${AWS::Region}'
        - !Ref S3BucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt S3Bucket.Arn
              - !Sub '${S3Bucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: 'false'
          # Access control relies on IAM: only the Platforma IRSA role has
          # s3:* permissions on this bucket via its inline policy. Removing
          # the previous deny-all-except-role pattern because it locked out
          # account administrators from cleanup after stack deletion
          # (the IRSA role is deleted with the stack, leaving no one with access).

  # ---------------------------------------------------------------------------
  # 8. ACM Certificate (DNS-validated via Route53)
  # ---------------------------------------------------------------------------
  Certificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref DomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZoneId
      Tags:
        - Key: Name
          Value: !Sub '${ClusterName}-certificate'

# =============================================================================
# Outputs
# =============================================================================
Outputs:
  ClusterName:
    Description: >
      EKS cluster name. Run: aws eks update-kubeconfig --name <ClusterName> --region <Region>
    Value: !Ref EksCluster

  ClusterEndpoint:
    Description: EKS API server endpoint
    Value: !GetAtt EksCluster.Endpoint

  Region:
    Description: >
      AWS region. Use: --set storage.main.s3.region=<value>
    Value: !Ref AWS::Region

  OidcProviderArn:
    Description: OIDC provider ARN for IRSA
    Value: !Ref OidcProvider

  EfsFileSystemId:
    Description: >
      EFS filesystem ID for Platforma workspace.
      Use: --set storageClasses.efs.fileSystemId=<value>
    Value: !Ref EfsFileSystem

  S3BucketName:
    Description: >
      S3 bucket for primary storage.
      Use: --set storage.main.s3.bucket=<value>
    Value: !Ref S3Bucket

  PlatformaRoleArn:
    Description: >
      IRSA role ARN for Platforma service account.
      Annotate the K8s SA: eks.amazonaws.com/role-arn=<value>
    Value: !GetAtt PlatformaIrsaRole.Arn

  AutoscalerRoleArn:
    Description: >
      IRSA role ARN for Cluster Autoscaler service account.
      Annotate the K8s SA: eks.amazonaws.com/role-arn=<value>
    Value: !GetAtt AutoscalerIrsaRole.Arn

  ALBControllerRoleArn:
    Description: >
      IRSA role ARN for AWS Load Balancer Controller.
      Annotate the K8s SA: eks.amazonaws.com/role-arn=<value>
    Value: !GetAtt ALBControllerRole.Arn

  ExternalDNSRoleArn:
    Description: >
      IRSA role ARN for External DNS.
      Annotate the K8s SA: eks.amazonaws.com/role-arn=<value>
    Value: !GetAtt ExternalDNSRole.Arn

  PlatformaNamespace:
    Description: >
      Kubernetes namespace for Platforma (reference only — created via kubectl in Step 4,
      not by this stack). Used in IRSA trust policies for all service accounts.
    Value: !Ref PlatformaNamespace

  CertificateArn:
    Description: >
      ACM certificate ARN for TLS termination on ALB.
      Use in ALB Ingress annotation: alb.ingress.kubernetes.io/certificate-arn=<value>
    Value: !Ref Certificate

  VpcId:
    Description: VPC ID (created or provided)
    Value: !If [CreateNewVpc, !Ref Vpc, !Ref VpcId]

  NodeGroupRoleArn:
    Description: IAM role ARN shared by all node groups
    Value: !GetAtt NodeGroupRole.Arn

  HelmDeployerBuildProject:
    Description: >
      CodeBuild project that deploys Kueue, AppWrapper, Cluster Autoscaler, ALB Controller,
      External DNS, and Platforma. Check its logs if the stack creation fails after ~20 minutes.
    Value: !Sub 'https://console.aws.amazon.com/codesuite/codebuild/${AWS::AccountId}/projects/${ClusterName}-helm-deployer/history'

  PostDeploySteps:
    Description: See infrastructure/aws/README.md for full instructions
    Value: >-
      Stack deploys everything automatically. Once complete: connect Desktop App to your domain on port 443.
      If deployment fails, check the CodeBuild project logs (see HelmDeployerBuildProject output).
      See infrastructure/aws/README.md for details.
