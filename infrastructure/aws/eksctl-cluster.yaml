# =============================================================================
# AWS EKS Cluster Configuration (eksctl)
# =============================================================================
# Creates EKS cluster with:
# - System node group (Platforma server, Kueue, controllers)
# - UI node group (interactive tasks, scales 0-16)
# - Batch node groups: medium, large, xlarge, 2xlarge, 4xlarge (scales 0-32)
# - EFS CSI driver addon (for RWX workspace storage)
# - EBS CSI driver addon (for gp3 database/main storage)
#
# Usage:
#   eksctl create cluster -f eksctl-cluster.yaml
#
# Cluster Autoscaler autodiscovery uses tags:
#   k8s.io/cluster-autoscaler/enabled=true
#   k8s.io/cluster-autoscaler/<cluster-name>=owned
# =============================================================================

apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: platforma-cluster
  region: eu-central-1
  version: "1.34"

iam:
  withOIDC: true

addons:
  - name: vpc-cni
    version: latest
  - name: coredns
    version: latest
  - name: kube-proxy
    version: latest
  - name: aws-ebs-csi-driver
    version: latest
    attachPolicyARNs:
      - arn:aws:iam::aws:policy/service-role/AmazonEBSCSIDriverPolicy
  - name: aws-efs-csi-driver
    version: latest
    attachPolicyARNs:
      - arn:aws:iam::aws:policy/service-role/AmazonEFSCSIDriverPolicy

managedNodeGroups:
  # System nodes - runs Platforma server, Kueue, controllers
  # m5.2xlarge: 8 vCPU / 32 GiB — fits Platforma at 8 CPU / 16 GiB
  - name: system
    instanceType: m5.2xlarge
    desiredCapacity: 2
    minSize: 1
    maxSize: 4
    labels:
      node.kubernetes.io/pool: system
    tags:
      nodegroup-type: system
      k8s.io/cluster-autoscaler/enabled: "true"
      k8s.io/cluster-autoscaler/platforma-cluster: "owned"

  # UI nodes - fast response for interactive tasks
  - name: ui
    instanceType: t3.xlarge
    desiredCapacity: 0
    minSize: 0
    maxSize: 16
    labels:
      node.kubernetes.io/pool: ui
    taints:
      - key: dedicated
        value: ui
        effect: NoSchedule
    tags:
      nodegroup-type: ui
      k8s.io/cluster-autoscaler/enabled: "true"
      k8s.io/cluster-autoscaler/platforma-cluster: "owned"

  # Batch nodes - small/medium compute workloads (scales from 0)
  # m5.2xlarge: 8 vCPU / 32 GiB
  - name: batch-medium
    instanceType: m5.2xlarge
    desiredCapacity: 0
    minSize: 0
    maxSize: 32
    labels:
      node.kubernetes.io/pool: batch
    taints:
      - key: dedicated
        value: batch
        effect: NoSchedule
    tags:
      nodegroup-type: batch
      k8s.io/cluster-autoscaler/enabled: "true"
      k8s.io/cluster-autoscaler/platforma-cluster: "owned"

  # Batch nodes - medium/large compute workloads (scales from 0)
  # m5.4xlarge: 16 vCPU / 64 GiB
  - name: batch-large
    instanceType: m5.4xlarge
    desiredCapacity: 0
    minSize: 0
    maxSize: 32
    labels:
      node.kubernetes.io/pool: batch
    taints:
      - key: dedicated
        value: batch
        effect: NoSchedule
    tags:
      nodegroup-type: batch
      k8s.io/cluster-autoscaler/enabled: "true"
      k8s.io/cluster-autoscaler/platforma-cluster: "owned"

  # Batch nodes - large compute workloads (scales from 0)
  # m5.8xlarge: 32 vCPU / 128 GiB
  - name: batch-xlarge
    instanceType: m5.8xlarge
    desiredCapacity: 0
    minSize: 0
    maxSize: 32
    labels:
      node.kubernetes.io/pool: batch
    taints:
      - key: dedicated
        value: batch
        effect: NoSchedule
    tags:
      nodegroup-type: batch
      k8s.io/cluster-autoscaler/enabled: "true"
      k8s.io/cluster-autoscaler/platforma-cluster: "owned"

  # Batch nodes - memory-intensive workloads (scales from 0)
  # r5.6xlarge: 24 vCPU / 192 GiB
  - name: batch-2xlarge
    instanceType: r5.6xlarge
    desiredCapacity: 0
    minSize: 0
    maxSize: 32
    labels:
      node.kubernetes.io/pool: batch
    taints:
      - key: dedicated
        value: batch
        effect: NoSchedule
    tags:
      nodegroup-type: batch
      k8s.io/cluster-autoscaler/enabled: "true"
      k8s.io/cluster-autoscaler/platforma-cluster: "owned"

  # Batch nodes - largest memory-intensive workloads (scales from 0)
  # r5.8xlarge: 32 vCPU / 256 GiB
  - name: batch-4xlarge
    instanceType: r5.8xlarge
    desiredCapacity: 0
    minSize: 0
    maxSize: 32
    labels:
      node.kubernetes.io/pool: batch
    taints:
      - key: dedicated
        value: batch
        effect: NoSchedule
    tags:
      nodegroup-type: batch
      k8s.io/cluster-autoscaler/enabled: "true"
      k8s.io/cluster-autoscaler/platforma-cluster: "owned"

cloudWatch:
  clusterLogging:
    enableTypes:
      - api
      - audit
      - authenticator
