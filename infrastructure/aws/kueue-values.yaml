# =============================================================================
# Kueue Helm Values for AWS EKS
# =============================================================================
# Validated in experiment: 2026-02-05-status-propagation-appwrapper
# Install:
#   helm install kueue oci://registry.k8s.io/kueue/charts/kueue \
#     --version 0.16.1 \
#     -n kueue-system --create-namespace \
#     -f kueue-values.yaml
# =============================================================================

controllerManager:
  manager:
    resources:
      limits:
        cpu: 500m
        memory: 1Gi
      requests:
        cpu: 100m
        memory: 512Mi

# -- Feature gates
# AppWrapper: Required for job wrapping. Requires separate AppWrapper controller:
#   kubectl apply --server-side -f https://github.com/project-codeflare/appwrapper/releases/download/v1.2.0/install.yaml
# ProvisioningACC: Enables ProvisioningRequest-based admission checks.
#   Prevents resource fragmentation by checking with the autoscaler whether pods
#   can actually be scheduled before admitting workloads.
#   Enabled by default in Kueue v0.10+. Listed explicitly for visibility.
featureGates:
  AppWrapper: true
  ProvisioningACC: true

# -- Framework integrations
integrations:
  frameworks:
    - "batch/job"
    - "jobset.x-k8s.io/jobset"
    - "workload.codeflare.dev/appwrapper"
  podOptions:
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values: [kube-system, kueue-system]

# -- Metrics for observability
metrics:
  enableClusterQueueResources: true
