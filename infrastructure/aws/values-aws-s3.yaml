# Platforma values for AWS EKS with S3 primary storage
# Designed for CloudFormation deployments where S3 bucket and IRSA are pre-created.
# Usage: see infrastructure/aws/README.md

environment: aws

storage:
  database:
    size: 50Gi
    storageClass: gp3  # auto-created by chart when environment: aws

  workspace:
    # EFS with Access Points — chart creates PV+PVC automatically.
    # The StorageClass "efs-platforma" is auto-created when environment: aws + fileSystemId is set.
    efs:
      enabled: true
      fileSystemId: ""  # --set storage.workspace.efs.fileSystemId=<EfsFileSystemId>

  main:
    s3:
      bucket: ""    # --set storage.main.s3.bucket=<S3BucketName>
      region: ""    # --set storage.main.s3.region=<Region>

# Auth — configure exactly one method.
# htpasswd: create a K8s secret first, then reference it.
# LDAP: provide server and bind/search configuration.
auth:
  htpasswd:
    secretName: ""  # --set auth.htpasswd.secretName=platforma-htpasswd
  # ldap:
  #   server: ""            # --set auth.ldap.server=ldap://ldap.example.com:389
  #   startTLS: false
  #   bindDN: ""            # --set auth.ldap.bindDN="cn=%u,ou=users,dc=example,dc=com"
  #   searchRules: []       # --set auth.ldap.searchRules[0]="(uid=%s)|ou=users,dc=example,dc=com"
  #   searchUser: ""
  #   searchPassword: ""

# Platforma server service account — created by the chart, annotated with IRSA role.
serviceAccount:
  create: true
  annotations: {}   # --set "serviceAccount.annotations.eks\.amazonaws\.com/role-arn=<PlatformaRoleArn>"

# Ingress — all values provided via --set in helm install (see README.md Step 6).
# values-aws-s3.yaml carries no ingress defaults; the full config is in the install command.
ingress:
  enabled: false       # --set ingress.enabled=true
  className: ""        # --set ingress.className=alb
  host: ""             # --set ingress.host=<DomainName>
  tls:
    enabled: false     # --set ingress.tls.enabled=true
    secretName: ""     # empty = ALB manages TLS via ACM certificate; no K8s TLS secret needed
  annotations: {}      # set via --set flags: scheme, target-type, listen-ports, certificate-arn, backend-protocol-version

kueue:
  mode: dedicated
  # Node pool topology — controls where jobs are scheduled
  pools:
    ui:
      nodeSelector:
        node.kubernetes.io/pool: ui
      tolerations:
        - key: dedicated
          value: ui
          effect: NoSchedule
    batch:
      nodeSelector:
        node.kubernetes.io/pool: batch
      tolerations:
        - key: dedicated
          value: batch
          effect: NoSchedule
  dedicated:
    # ClusterQueue quotas: max simultaneous CPU/memory admitted across all workloads per queue.
    # UI default (4 CPU / 16Gi) matches one t3.xlarge. Increase for concurrent UI jobs.
    # Batch default (60 CPU / 240Gi) is ~7 × m5.2xlarge concurrent. Increase for heavier workloads.
    resources:
      ui:
        cpu: 4
        memory: 16Gi
      batch:
        cpu: 60
        memory: 240Gi

# Schedule Platforma server on system nodes
app:
  nodeSelector:
    node.kubernetes.io/pool: system
