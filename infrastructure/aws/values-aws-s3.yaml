# Platforma on AWS EKS with S3 primary storage
# For manual deployments where S3 bucket and IRSA are pre-created.
# See infrastructure/aws/advanced-installation.md for full setup guide.

environment: aws

storage:
  database:
    size: 50Gi
    storageClass: gp3

  workspace:
    # EFS shared filesystem for job data.
    # Provide the EFS filesystem ID created in Step 2.
    efs:
      enabled: true
      fileSystemId: ""  # --set storage.workspace.efs.fileSystemId=<EfsFileSystemId>

  main:
    # S3 bucket for results — Desktop App downloads data from here.
    # IRSA handles authentication (no access keys needed).
    type: s3
    s3:
      bucket: ""    # --set storage.main.s3.bucket=<S3BucketName>
      region: ""    # --set storage.main.s3.region=<Region>

# Authentication — configure exactly one method.
# Inline credentials (simplest): chart auto-generates the htpasswd secret.
# Existing secret: create a K8s secret yourself, then set secretName.
# LDAP: uncomment and provide server + bind/search configuration.
auth:
  htpasswd:
    credentials: []  # --set auth.htpasswd.credentials[0].username=admin --set auth.htpasswd.credentials[0].password=<password>
    # secretName: ""  # alternative: reference an existing htpasswd secret
  # ldap:
  #   server: ""            # --set auth.ldap.server=ldap://ldap.example.com:389
  #   startTLS: false
  #   bindDN: ""            # --set auth.ldap.bindDN="cn=%u,ou=users,dc=example,dc=com"
  #   searchRules: []       # --set auth.ldap.searchRules[0]="(uid=%s)|ou=users,dc=example,dc=com"
  #   searchUser: ""
  #   searchPassword: ""

# Platforma server service account — annotate with IRSA role for S3 access.
serviceAccount:
  create: true
  annotations: {}   # --set "serviceAccount.annotations.eks\.amazonaws\.com/role-arn=<PlatformaRoleArn>"

# Job service account — annotate with IRSA role for S3 access (jobs need S3 too).
jobServiceAccount:
  create: true
  annotations: {}   # --set "jobServiceAccount.annotations.eks\.amazonaws\.com/role-arn=<PlatformaJobsRoleArn>"

# Ingress — Desktop App connects through this.
# All values provided via --set in helm install (see advanced-installation.md Step 10).
ingress:
  enabled: false       # --set ingress.enabled=true
  className: ""        # --set ingress.className=alb
  host: ""             # --set ingress.host=<DomainName>
  tls:
    enabled: false     # --set ingress.tls.enabled=true
    secretName: ""     # empty = ALB manages TLS via ACM certificate
  annotations: {}      # set via --set: scheme, target-type, listen-ports, certificate-arn, backend-protocol-version

kueue:
  # Max resources for a single job (rejects jobs that exceed this).
  maxJobResources:
    cpu: 62
    memory: 500Gi
  mode: dedicated
  # Node pools — controls where jobs run.
  # Must match your EKS node group labels and taints.
  pools:
    ui:
      nodeSelector:
        node.kubernetes.io/pool: ui
      tolerations:
        - key: dedicated
          value: ui
          effect: NoSchedule
    batch:
      nodeSelector:
        node.kubernetes.io/pool: batch
      tolerations:
        - key: dedicated
          value: batch
          effect: NoSchedule
  dedicated:
    # Max simultaneous resources per queue. Adjust based on your node group scaling limits.
    # Defaults match the CloudFormation "small" deployment size.
    resources:
      ui:
        cpu: 64
        memory: 256Gi
      batch:
        cpu: 126
        memory: 500Gi

# Platforma server runs on system nodes (not on compute nodes used for jobs).
app:
  resources:
    requests:
      cpu: 4
      memory: 16Gi
    limits:
      cpu: 8
      memory: 16Gi
  nodeSelector:
    node.kubernetes.io/pool: system
