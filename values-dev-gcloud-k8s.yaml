monitoring:
  enabled: true

debug:
  enabled: true

# -- If you are struggling with the computer use either medium (4 cpu 16 gb) or large (8 cpu 32 gb)
#  nodeSelector:
#    node.milab.io/pool: large
#  tolerations:
#    - key: "dedicated"
#      operator: "Equal"
#      value: "large"
#      effect: "NoSchedule"

# Toleration - allows pod to schedule on tainted nodes
tolerations:
  - key: "dedicated"
    operator: "Equal"
    value: "large"
    effect: "NoSchedule"

# Affinity - ensures pod schedules ONLY on large-pool nodes
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: "node.milab.io/pool"
              operator: "In"
              values:
                - "large"
securityContext:
  runAsUser: 1010
  runAsGroup: 1010
  podSecurityContext:
    fsGroup: 1010
probes:
  liveness:
    enabled: true
    # -- Type of probe. Can be 'httpGet', 'tcpSocket', or 'grpc'.
    type: grpc
    # -- Common probe settings
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    successThreshold: 1
    failureThreshold: 6
    # -- Configuration for httpGet probe
    httpGet:
      path: /health
      port: 8080 # Port for httpGet probe
    # -- Configuration for tcpSocket probe
    tcpSocket:
      port: 6345 # Port for tcpSocket probe
    # -- Configuration for grpc probe
    grpc:
      port: 6345 # Port for gRPC probe
      # -- Service name for gRPC probe. Required for headless services.
      service: ""
  readiness:
    enabled: true
    # -- Type of probe. Can be 'httpGet', 'tcpSocket', or 'grpc'.
    type: grpc
    # -- Common probe settings
    initialDelaySeconds: 30
    periodSeconds: 5
    timeoutSeconds: 60
    successThreshold: 1
    failureThreshold: 6
    # -- Configuration for httpGet probe
    httpGet:
      path: /health
      port: 8080 # Port for httpGet probe
    # -- Configuration for tcpSocket probe
    tcpSocket:
      port: 6345 # Port for tcpSocket probe
    # -- Configuration for grpc probe
    grpc:
      port: 6345 # Port for gRPC probe
      # -- Service name for gRPC probe. Required for headless services.
      service: ""