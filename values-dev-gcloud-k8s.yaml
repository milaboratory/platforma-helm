#
# NOTE: this values.yaml is for dev-common GKE instance used by backend team.
#
# How to use:
#   helm upgrade --install "dev-common" platforma/platforma --values values-dev-gcloud.yaml --namespace dev-gke
#

docker:
  enabled: true
  resources:
    limits:
      cpu: 8
      memory: 16Gi

image:
  repository: europe-west3-docker.pkg.dev/mik8s-euwe3-prod-gke-project/pl/pl
  pullPolicy: Always
  tag: "1.45.3-357-1598-merge" # or Chart.AppVersion

serviceAccount:
  create: false
  name: "platforma-ci-sa"

service:
  type: LoadBalancer # ClusterIP, NodePort, LoadBalancer
  annotations:
    external-dns.alpha.kubernetes.io/hostname: common-dev.gcp.milaboratories.com

env:
  secretVariables:
    - name: PL_LICENSE
      secretKeyRef:
        name: pl-license-secret
        key: pl-license-key

deployment:
  redeployOnUpgrade: true

logging:
  destination: "dir:///var/log/platforma"
  persistence:
    enabled: true

persistence:
  mainRoot:
    name: "nfs-volume"
    dataPath: "dev/common"
    workDirName: "work"
    packagesDirName: "packages"
    mountPath: /data/nfs
    existingClaim: "filestore-ci-fast-pvc"
    initDirsChown: false

  dbDir:
    enabled: true
    storageClass: "standard-rwo"
    mountPath: /data/rocksdb

artifactRegistry: "https://mi-test-assets.storage.googleapis.com/pub/assets/"

gcp:
  gar: "europe-west3-docker.pkg.dev/mik8s-euwe3-prod-gke-project/pl-containers/milaboratories/pl-containers"
  serviceAccount: "mik8s-platforma-ci-access@mik8s-euwe3-prod-gke-project.iam.gserviceaccount.com"
  projectId: "mik8s-euwe3-prod-gke-project"

primaryStorage:
  s3:
    enabled: false

  gcs:
    enabled: true
    url: "gs://mik8s-platforma-ci-euwe3-dev-gke/dev/common/primary/" # e.g., gs://<bucket>[/<prefix-in-bucket>]

dataLibrary:
  s3:
    - id: "library"
      enabled: false

  gcs:
    - id: "library"
      enabled: true
      url: "gs://mik8s-platforma-library-euwe3-prod-gke/"
    - id: "test-assets"
      enabled: true
      url: "gs://mik8s-platforma-ci-euwe3-dev-gke/test-assets/"

authOptions:
  ldap:
    enabled: false
    server: "ldap://pl0-glauth.prod-pl0.svc.cluster.local:3893"
    dn: "cn=%u,ou=users,ou=users,dc=pldemo,dc=io"

extraArgs:
  # - --skip-extended-self-check
  # - --auth-sessions-gen=1
  - --google-batch-job-dump-configs=/data/nfs/dev/common/google-batch-job-dump-configs
  - --queue-runner=ui-tasks:k8s
  - --queue-runner=light:k8s
  - --queue-runner=medium:k8s
  - --queue-runner=heavy:k8s
  - --k8s-max-cpu-request=8
  - --k8s-max-ram-request=32Gi

k8s:
  enabled: true


