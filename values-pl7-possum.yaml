# =============================================================================
# Migration Values for Release: pl7
# =============================================================================

# -- Image configuration
# This is the image tag from your old values file.
image:
  repository: "511903394050.dkr.ecr.eu-central-1.amazonaws.com/pl"
  pullPolicy: Always  
  tag: "main"

imagePullSecrets:
  - name: regcred

# -- Service Account configuration
# Reusing existing Service Account to preserve permissions.
serviceAccount:
  create: true

# -- Ingress configuration
# This is the ingress configuration from your old values file.
ingress:
  enabled: true
  className: "traefik"
  host: pl7.demo2.platforma.bio
  tls:
    enabled: true
    secretName: "wildcar-k8s-demo2-plbio-tls"

# -- Service configuration
service:
  annotations:
    traefik.ingress.kubernetes.io/service.serversscheme: h2c

# -- Main Options
mainOptions:
  licenseFile:
    secretRef:
      enabled: false
debug:
  enabled: true
# -- Persistence configuration
# This section reuses your existing PersistentVolumeClaims.
persistence:
  mainRoot:
    enabled: false

  dbDir:
    enabled: true
    createPvc: true
    storageClass: "local-path"
    #existingClaim: "pl7-platforma-database"
    mountPath: "/db"

  workDir:
    enabled: true
    createPvc: true
    storageClass: "local-path"
    #existingClaim: "pl7-platforma-work"
    mountPath: "/data/work"

  packagesDir:
    enabled: true
    createPvc: true
    storageClass: "local-path"
    #existingClaim: "pl7-platforma-softwareloader"
    mountPath: "/storage/controllers/software-loader"

# -- Resource limits and requests
# These are the resource settings from your old values file.
resources:
  limits:
    memory: 56320Mi
  requests:
    memory: 4096Mi

# -- S3 Primary Storage Configuration
# This is the S3 configuration from your old values file.
primaryStorage:
  s3:
    enabled: true
    url: "https://fsn1.your-objectstorage.com/milab-fsn1-prod-data-s3-platforma-demo/user-pl7/"
    secretRef:
      enabled: false

# -- Data Library Configuration
# This is the data library configuration from your old values file.
dataLibrary:
  s3:
    - id: "raw"
      enabled: true
      url: "https://fsn1.your-objectstorage.com/milab-fsn1-prod-data-s3-platforma-demo/corp-library/"
      secretRef:
        enabled: false
    - id: "test-assets"
      enabled: true
      url: "https://fsn1.your-objectstorage.com/milab-fsn1-prod-data-s3-platforma-demo/test-assets/"
      secretRef:
        enabled: false

# -- Authentication Options
# This is the authentication configuration from your old values file.
authOptions:
  ldap:
    enabled: true
    server: "ldap://pl7-glauth.prod-pl7.svc.cluster.local:3893"
    dn: "cn=%u,ou=users,ou=users,dc=pldemo,dc=io"
    tls:
      enabled: false
      secretRef:
        enabled: false
extraArgs:
  - --debug-enabled
  - --log-level=debug
  - --keep-faulty-workdirs=30m

# -- Environment Variables
env:
  variables:
    AWS_REGION: eu-central
  secretVariables:
    - name: PL_LICENSE
      secretKeyRef:
        name: pl-license-secret
        key: pl-license-key
    - name: MI_LICENSE
      secretKeyRef:
        name: mixcr-license-secret
        key: mixcr-license-key
    - name: AWS_ACCESS_KEY_ID
      secretKeyRef:
        name: pl-hetzner-secrets
        key: aws-access-key-id
    - name: AWS_SECRET_ACCESS_KEY
      secretKeyRef:
        name: pl-hetzner-secrets
        key: aws-secret-access-key

# -- Deployment Configuration
deployment:
  securityContext:
    runAsUser: 0
    runAsGroup: 0
    runAsNonRoot: false
    readOnlyRootFilesystem: false
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
  podSecurityContext:
    fsGroup: 3000
  redeployOnUpgrade: true    
  podAnnotations:
   prometheus.io/scrape: "true"
   prometheus.io/port: "9090"
   prometheus.io/scheme: "http"
   prometheus.io/path: "/metrics"
monitoring:
  enabled: true
  port: 9090
